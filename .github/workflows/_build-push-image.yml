# =============================================================================
# Reusable Workflow: Build and Push Docker Image
# =============================================================================
#
# Builds a Next.js Docker image from the private frontend-portfolio repo
# and pushes it to ECR using scripts/push-to-ecr.ts.
#
# Two-job architecture:
#   1. Build — checks out frontend-portfolio, builds Docker image, caches
#      the tar via actions/cache (no AWS credentials needed)
#   2. Push — restores the cached image, runs push-to-ecr.ts to authenticate
#      with ECR and push the image
#
# Prerequisites:
#   - CROSS_REPO_PAT secret with `repo` scope for frontend-portfolio access
#   - AWS OIDC role with ECR push permissions
#   - SSM parameter containing the ECR repository URL
# =============================================================================

name: Build and Push Docker Image (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      image-tag:
        description: "Docker image tag (default: latest)"
        required: false
        type: string
        default: "latest"
      ssm-ecr-param:
        description: "SSM parameter name for ECR repository URL"
        required: true
        type: string
      push-to-dockerhub:
        description: "Also push image to Docker Hub"
        required: false
        type: boolean
        default: false
      api-url:
        description: "Articles API URL (NEXT_PUBLIC_API_URL) to inject at build time"
        required: false
        type: string
        default: ""
      frontend-repo:
        description: "Frontend repository (owner/name)"
        required: false
        type: string
        default: "Nelson-Lamounier/frontend-portfolio"
      frontend-ref:
        description: "Git ref to checkout from frontend repo (branch, tag, SHA)"
        required: false
        type: string
        default: "main"
    secrets:
      AWS_OIDC_ROLE:
        required: true
      CROSS_REPO_PAT:
        description: "GitHub PAT with repo scope for private frontend-portfolio access"
        required: true
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false
env:
  AWS_REGION: 'eu-west-1'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ===========================================================================
  # Job 1: Build Docker Image (no AWS credentials needed)
  # ===========================================================================
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: ${{ inputs.frontend-repo }}
          ref: ${{ inputs.frontend-ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: false
          tags: frontend:${{ inputs.image-tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          build-args: |
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          outputs: type=docker,dest=/tmp/docker-image.tar

      - name: Cache Docker Image
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/docker-image.tar | cut -f1)
          echo "## Docker Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: ${{ inputs.frontend-repo }}@${{ inputs.frontend-ref }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job 2: Push to ECR via scripts/push-to-ecr.ts
  # ===========================================================================
  push:
    name: Push to Registries
    needs: [build]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    permissions:
      id-token: write
      contents: read

    steps:
      # ----------------------------------------------------------------
      # Checkout cdk-monitoring (owns scripts/push-to-ecr.ts)
      # ----------------------------------------------------------------
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn

      # ----------------------------------------------------------------
      # AWS Credentials
      # ----------------------------------------------------------------
      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # ----------------------------------------------------------------
      # Restore and load Docker image from cache
      # ----------------------------------------------------------------
      - name: Restore Docker Image from Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/docker-image.tar
          key: docker-image-${{ inputs.environment }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          echo "Loading Docker image from cache..."
          docker load -i /tmp/docker-image.tar
          echo "[PASS] Image loaded"

      # ----------------------------------------------------------------
      # Resolve ECR URL from SSM
      # ----------------------------------------------------------------
      - name: Resolve ECR URL
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "${{ inputs.ssm-ecr-param }}" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::ECR repository URL not found in SSM: ${{ inputs.ssm-ecr-param }}"
            exit 1
          fi

          # Mask ECR URL (contains AWS account ID)
          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      # ----------------------------------------------------------------
      # Push to ECR using the push-to-ecr.ts script
      # ----------------------------------------------------------------
      - name: Push to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"

          npx tsx scripts/push-to-ecr.ts \
            --env "${{ inputs.environment }}" \
            --tag "${{ inputs.image-tag }}" \
            --ecr-url "$ECR_URL" \
            --image-name "frontend:${{ inputs.image-tag }}" \
            --skip-build \
            --skip-sync \
            --region "${{ env.AWS_REGION }}"

      # ----------------------------------------------------------------
      # ----------------------------------------------------------------
      # Optional: Docker Hub
      # ----------------------------------------------------------------
      - name: Login to Docker Hub
        if: inputs.push-to-dockerhub
        uses: docker/login-action@v4
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push to Docker Hub
        if: inputs.push-to-dockerhub
        run: |
          TAG="${{ inputs.image-tag }}"
          DOCKERHUB_REPO="lamounierdev/nextjs-application"

          docker tag "frontend:${TAG}" "${DOCKERHUB_REPO}:${TAG}"
          docker tag "frontend:${TAG}" "${DOCKERHUB_REPO}:latest"

          docker push "${DOCKERHUB_REPO}:${TAG}"
          docker push "${DOCKERHUB_REPO}:latest"

          echo "[PASS] Image pushed to Docker Hub"

      # ----------------------------------------------------------------
      # Summary
      # ----------------------------------------------------------------
      - name: Push Summary
        run: |
          echo "## Image Pushed to Registries" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### ECR" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ inputs.image-tag }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Pushed to ECR" >> $GITHUB_STEP_SUMMARY
          if [ "${{ inputs.push-to-dockerhub }}" = "true" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Docker Hub" >> $GITHUB_STEP_SUMMARY
            echo "- **Status**: ✅ Pushed to Docker Hub" >> $GITHUB_STEP_SUMMARY
          fi
