# @format
# @description Reusable Post-Bootstrap Configuration Workflow
#
# ─── Purpose ───────────────────────────────────────────────────────
# Injects application secrets and verifies ArgoCD health after cluster
# bootstrap (SM-A) or standalone for secret rotation.
#
# ─── Architecture ──────────────────────────────────────────────────
# This workflow triggers the Config Orchestrator (SM-B) which runs all
# six deploy.py scripts sequentially on the control-plane node:
#
#   Step 1: nextjs/deploy.py      — nextjs-secrets + IngressRoute originSecret
#   Step 2: monitoring/deploy.py  — Grafana + GitHub K8s Secrets + Helm chart
#   Step 3: start-admin/deploy.py — Cognito / DynamoDB / Bedrock Secret
#   Step 4: admin-api/deploy.py   — admin-api ConfigMap + Secret + IngressRoute
#   Step 5: public-api/deploy.py  — public-api ConfigMap + Secret + IngressRoute
#   Step 6: wiki-mcp/deploy.py    — wiki-mcp-config ConfigMap + wiki-mcp-basicauth Secret
#
# SM-B reads the control-plane instance ID directly from SSM
# ({ssmPrefix}/bootstrap/control-plane-instance-id), written by SM-A,
# eliminating the need for a router Lambda in this workflow.
#
# ─── Job Flow ──────────────────────────────────────────────────────
#   wait-workers → inject-config → verify
#
#   1. wait-workers    — Poll SSM execution IDs published by trigger-bootstrap.ts
#                        until all worker SSM Automations reach a terminal state.
#   2. inject-config   — Start SM-B via trigger-config.ts; wait up to 60 min.
#   3. verify          — ArgoCD health + IngressRoute origin-secret check
#                        + K8s smoke tests
#
# ─── Usage ─────────────────────────────────────────────────────────
#   Called by:
#     - _deploy-ssm-automation.yml  (Phase 6, after bootstrap completes)
#     - deploy-post-bootstrap.yml   (standalone for secret-only updates)
#
#   Manual local equivalent:
#     just config-run development
#
# ─── SM-B ARN Resolution ───────────────────────────────────────────
#   The config SM ARN is read from SSM at:
#     /k8s/<cdk-environment>/bootstrap/config-state-machine-arn
#   This parameter is written by CDK when SsmAutomation stack deploys.

name: Post-Bootstrap Config (Reusable)

on:
  workflow_call:
    inputs:
      environment:
        description: "Target environment (development, staging, production)"
        required: true
        type: string
      cdk-environment:
        description: "CDK environment name (used by verify steps)"
        required: true
        type: string
    secrets:
      AWS_OIDC_ROLE:
        description: "AWS OIDC role ARN"
        required: false

permissions:
  id-token: write   # Required for OIDC → aws-actions/configure-aws-credentials
  contents: read    # Required for actions/checkout

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Wait for Worker SSM Automations
  #
  # SM-B requires worker nodes to have joined the cluster so that its deploy.py
  # scripts can schedule pods correctly. trigger-bootstrap.ts fires all worker
  # automations and exits immediately WITHOUT waiting for them to complete.
  # This step reads each worker execution ID from SSM and polls until all reach
  # a terminal state.
  #
  # Timeout: 900s (15 min) — matches SSM Automation document timeout.
  # Non-fatal on individual worker failures — a single bad worker does not
  # block secret injection for a cluster with healthy majority quorum.
  # ===========================================================================
  wait-workers:
    name: Wait for Worker Automations
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Poll worker SSM Automation execution IDs published to SSM by
      # trigger-bootstrap.ts until all reach a terminal state.
      #
      # Non-fatal: a single bad worker does not block SM-B.
      # -----------------------------------------------------------------------
      - name: "Wait for Worker SSM Automations"
        env:
          AWS_REGION: ${{ env.AWS_REGION }}
        shell: bash
        run: |
          SSM_PREFIX="/k8s/${{ inputs.cdk-environment }}"
          MAX_WAIT=900   # 15 min — matches SSM document timeout
          POLL=20        # poll every 20 seconds

          # Execution ID parameters published by trigger-bootstrap.ts
          EXEC_PARAMS=(
            "${SSM_PREFIX}/bootstrap/worker-execution-id"
            "${SSM_PREFIX}/bootstrap/mon-worker-execution-id"
            "${SSM_PREFIX}/bootstrap/argocd-worker-execution-id"
            "${SSM_PREFIX}/bootstrap/general-pool-execution-id"
            "${SSM_PREFIX}/bootstrap/monitoring-pool-execution-id"
          )

          # Collect execution IDs that were actually written (skip absent params)
          declare -A EXEC_IDS
          for PARAM in "${EXEC_PARAMS[@]}"; do
            ID=$(aws ssm get-parameter --name "$PARAM" \
              --query Parameter.Value --output text 2>/dev/null || echo "")
            if [ -n "$ID" ] && [ "$ID" != "None" ]; then
              EXEC_IDS["$PARAM"]="$ID"
              echo "  Found: $(basename $PARAM) = $ID"
            fi
          done

          if [ ${#EXEC_IDS[@]} -eq 0 ]; then
            echo "[SKIP] No worker execution IDs found in SSM — bootstrap may not have run or is Day-0"
            exit 0
          fi

          echo "Waiting for ${#EXEC_IDS[@]} worker automation(s) to reach terminal state..."
          echo "  Max wait: ${MAX_WAIT}s | Poll interval: ${POLL}s"
          echo ""

          # Resolve status for a single execution ID.
          # Detects ID type by prefix:
          #   arn:aws:states:* → Step Functions execution ARN  (general-pool, monitoring-pool)
          #   UUID              → SSM Automation execution ID  (worker, mon-worker, argocd-worker)
          # Maps both APIs to a common terminal-state vocabulary.
          get_status() {
            local ID="$1"
            if [[ "$ID" == arn:aws:states:* ]]; then
              local SFN_STATUS
              SFN_STATUS=$(aws stepfunctions describe-execution \
                --execution-arn "$ID" \
                --query 'status' \
                --output text 2>/dev/null || echo "UNKNOWN")
              case "$SFN_STATUS" in
                SUCCEEDED)  echo "Success" ;;
                FAILED)     echo "Failed" ;;
                TIMED_OUT)  echo "TimedOut" ;;
                ABORTED)    echo "Cancelled" ;;
                *)          echo "Running" ;;
              esac
            else
              aws ssm get-automation-execution \
                --automation-execution-id "$ID" \
                --query AutomationExecution.AutomationExecutionStatus \
                --output text 2>/dev/null || echo "Unknown"
            fi
          }

          waited=0
          while [ $waited -lt $MAX_WAIT ]; do
            all_done=true
            for PARAM in "${!EXEC_IDS[@]}"; do
              ID="${EXEC_IDS[$PARAM]}"
              STATUS=$(get_status "$ID")
              echo "  $(basename $PARAM): $STATUS (${waited}s elapsed)"
              case $STATUS in
                Success|Failed|TimedOut|Cancelled|CompletedWithFailure) ;;
                *) all_done=false ;;
              esac
            done

            if $all_done; then
              echo ""
              echo "[OK] All worker automations reached a terminal state after ${waited}s"
              break
            fi

            sleep $POLL
            waited=$((waited + POLL))
          done

          echo ""
          echo "Worker automation wait complete (${waited}s). Proceeding with SM-B."

  # ===========================================================================
  # Inject Config — Config Orchestrator (SM-B)
  #
  # Triggers SM-B which runs all five deploy.py scripts sequentially on the
  # control-plane node. SM-B reads the CP instance ID from SSM internally.
  #
  # SM-B ARN resolved from: /k8s/<cdk-environment>/bootstrap/config-state-machine-arn
  # ===========================================================================
  inject-config:
    name: Inject App Config (SM-B)
    needs: [wait-workers]
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 70
    environment: ${{ inputs.environment }}
    outputs:
      config_execution_arn: ${{ steps.trigger-config.outputs.config_execution_arn }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js & Install dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      # -----------------------------------------------------------------------
      # Trigger Config Orchestrator (SM-B)
      #
      # trigger-config.ts resolves SM-B ARN from SSM, starts the execution,
      # and polls until it reaches a terminal state (max 60 min).
      #
      # SM-B runs six deploy.py scripts sequentially on the control plane:
      #   1. nextjs/deploy.py      — K8s Secret + IngressRoute originSecret patch
      #   2. monitoring/deploy.py  — K8s Secrets + Helm chart + Grafana reset
      #   3. start-admin/deploy.py — Cognito / DynamoDB / Bedrock Secret
      #   4. admin-api/deploy.py   — ConfigMap + Secret + IngressRoute
      #   5. public-api/deploy.py  — ConfigMap + Secret + IngressRoute
      #   6. wiki-mcp/deploy.py    — wiki-mcp-config ConfigMap + wiki-mcp-basicauth Secret
      #
      # Equivalent local command: just config-run ${{ inputs.environment }}
      # -----------------------------------------------------------------------
      - name: "Trigger Config Orchestrator (SM-B)"
        id: trigger-config
        run: |
          npx tsx infra/scripts/cd/trigger-config.ts \
            --environment ${{ inputs.cdk-environment }} \
            --region ${{ vars.AWS_REGION || 'eu-west-1' }} \
            --max-wait 3600


  # ===========================================================================
  # Verify & Smoke Tests (k8s-runner — direct in-cluster kubectl)
  #
  # Runs after SM-B completes. Verifies ArgoCD health, pod readiness,
  # IngressRoute origin secret, and cluster smoke tests.
  #
  # Runs on k8s-runner (same pattern as deploy-api.yml deploy jobs):
  #   - Fetches kubeconfig from SSM; rewrites 127.0.0.1:6443 → kubernetes.default.svc:443
  #   - All kubectl calls are direct (no SSM send-command → EC2 hop)
  #   - Eliminates the 10–12 s polling overhead per SSM command invocation
  #
  # Skipped on Day-0 when no kubeconfig exists yet (k8s-runner pod can still
  # start; kubeconfig fetch step will fail gracefully if SSM param is absent).
  # ===========================================================================
  verify:
    name: Verify & Smoke Tests
    needs: [inject-config]
    if: >-
      always()
      && (needs.inject-config.result == 'success' || needs.inject-config.result == 'skipped')
    runs-on: k8s-runner
    timeout-minutes: 20
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      # -----------------------------------------------------------------------
      # Set up in-cluster kubeconfig
      #
      # Fetched from SSM; server URL rewritten from 127.0.0.1:6443 (control-plane
      # localhost tunnel) to kubernetes.default.svc:443 (in-cluster DNS).
      # The same CA cert validates both endpoints — no TLS skip required.
      #
      # Pattern: identical to deploy-api.yml deploy-admin-api / deploy-public-api.
      # -----------------------------------------------------------------------
      - name: Set up in-cluster kubeconfig
        run: |
          aws ssm get-parameter \
            --name "/k8s/${{ inputs.cdk-environment }}/kubeconfig" \
            --with-decryption \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameter.Value' \
            --output text \
            | sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc:443|g' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Wait for ArgoCD Token
        id: argocd-token
        continue-on-error: true # Day-0: token may not exist on first deployment
        run: |
          SECRET_NAME="k8s/${{ inputs.cdk-environment }}/argocd-ci-token"
          MAX_ATTEMPTS=20
          INTERVAL=30

          # Mask Secrets Manager name to avoid exposing naming convention
          echo "::add-mask::$SECRET_NAME"

          echo "Polling Secrets Manager for ArgoCD CI token..."
          echo "  Max wait: $(( MAX_ATTEMPTS * INTERVAL ))s"
          echo ""

          for i in $(seq 1 $MAX_ATTEMPTS); do
            TOKEN=$(aws secretsmanager get-secret-value \
              --secret-id "$SECRET_NAME" \
              --query SecretString --output text 2>/dev/null || echo "")

            if [ -n "$TOKEN" ]; then
              echo "::add-mask::$TOKEN"
              echo "token=$TOKEN" >> $GITHUB_OUTPUT
              echo "[OK] ArgoCD token retrieved (attempt $i/${MAX_ATTEMPTS})"
              exit 0
            fi

            echo "Attempt $i/${MAX_ATTEMPTS} — token not ready, waiting ${INTERVAL}s..."
            sleep $INTERVAL
          done

          echo "::warning::ArgoCD token not found after ${MAX_ATTEMPTS} attempts — Day-0 bootstrap; skipping ArgoCD verification"

      # -----------------------------------------------------------------------
      # ArgoCD Pod Readiness (direct kubectl — no SSM hop)
      #
      # Replaces the previous SSM send-command → EC2 → kubectl chain.
      # The k8s-runner pod is already inside the cluster; KUBECONFIG points
      # directly to the API server via kubernetes.default.svc:443.
      #
      # Strategy: kubectl --for=condition=Available (NO HTTP / NO token).
      #   - argocd-server, argocd-repo-server, argocd-dex-server, argocd-redis
      #     → checked via `kubectl wait deployment ... --for=condition=Available`
      #   - argocd-application-controller
      #     → checked via `kubectl rollout status statefulset/...`
      #
      # Timeout: 360s — accommodates the ~3–5 min re-bootstrap stabilisation window.
      # -----------------------------------------------------------------------
      - name: "ArgoCD Pod Readiness"
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "Waiting for ArgoCD deployments to become Available..."

          for deploy in argocd-server argocd-repo-server argocd-dex-server argocd-redis; do
            kubectl wait deployment/$deploy \
              -n argocd \
              --for=condition=Available \
              --timeout=360s \
              2>/dev/null \
              && echo "  [OK] $deploy" \
              || echo "  ::warning::$deploy not yet Available — may still be starting"
          done

          kubectl rollout status statefulset/argocd-application-controller \
            -n argocd \
            --timeout=360s \
            2>/dev/null \
            && echo "  [OK] argocd-application-controller" \
            || echo "  ::warning::argocd-application-controller not yet rolled out"

          echo "[OK] ArgoCD pod readiness check complete"

      # -----------------------------------------------------------------------
      # Wait for Application Pods Ready (direct kubectl — no SSM hop)
      #
      # Polls until at least 2 app pods are Running across nextjs-app and
      # start-admin namespaces. 40 x 15 s = 10 min budget.
      # -----------------------------------------------------------------------
      - name: "Wait for App Pods Ready"
        id: app-pods-ready
        continue-on-error: true # Warn rather than hard-fail in edge cases
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          MIN_PODS=2   # nextjs + start-admin (minimum viable traffic)
          MAX_POLLS=40 # 40 x 15s = 10 min
          POLL=15

          echo "Polling for app pods Ready..."
          echo "  Minimum pods: $MIN_PODS | Max polls: $MAX_POLLS | Interval: ${POLL}s"
          echo ""

          for i in $(seq 1 $MAX_POLLS); do
            COUNT=$(kubectl get pods -A --no-headers 2>/dev/null \
              | awk '$1=="nextjs-app" || $1=="start-admin"' \
              | grep -c Running || true)

            echo "  [$i/$MAX_POLLS] Running app pods: ${COUNT:-0}"

            if [ "${COUNT:-0}" -ge $MIN_PODS ] 2>/dev/null; then
              echo ""
              echo "[OK] $COUNT app pods are Running — site should be serving traffic"
              exit 0
            fi

            sleep $POLL
          done

          echo "::warning::App pods did not reach $MIN_PODS Running within $((MAX_POLLS * POLL))s — site may be starting up"

      # -----------------------------------------------------------------------
      # Verify CloudFront Origin Secret Injected (direct kubectl — no SSM hop)
      #
      # Confirms the Traefik IngressRoute originSecret has been replaced with
      # a real value by deploy.py. A lingering placeholder means CloudFront
      # requests will receive 404s from Traefik.
      # -----------------------------------------------------------------------
      - name: "Verify CloudFront Origin Secret Injected"
        id: verify-origin-secret
        if: steps.argocd-token.outputs.token != '' && steps.argocd-token.outcome == 'success'
        continue-on-error: false
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          MATCH=$(kubectl get ingressroute nextjs \
            -n nextjs-app \
            -o jsonpath='{.spec.routes[0].match}' 2>/dev/null \
            || echo "INGRESSROUTE_NOT_FOUND")

          echo "IngressRoute match rule: $MATCH"

          if echo "$MATCH" | grep -q "PLACEHOLDER_NEVER_MATCHES"; then
            echo "::error::IngressRoute still contains the placeholder originSecret."
            echo "::error::SM-B deploy.py Step 5 failed to patch the IngressRoute directly."
            echo "::error::Check Step Functions and CloudWatch logs for 'FATAL' or 'Verification FAILED'."
            exit 1
          fi

          if echo "$MATCH" | grep -q "INGRESSROUTE_NOT_FOUND"; then
            echo "::warning::IngressRoute 'nextjs' not found in nextjs-app namespace — ArgoCD may not have synced yet"
            exit 0
          fi

          echo "[OK] IngressRoute has a real origin secret — CloudFront routing is active."

      # -----------------------------------------------------------------------
      # K8s Smoke Tests (direct kubectl — no SSM hop)
      #
      # Inline checks replace the previous `just ci-smoke-kubernetes-infra`
      # TypeScript integration test (which itself used SSM send-command).
      # Validates core cluster health signals:
      #   - Pods not in CrashLoopBackOff or Error
      #   - ArgoCD applications Synced or OutOfSync (not Unknown/Degraded)
      #   - Namespaces for all managed services exist
      # -----------------------------------------------------------------------
      - name: Run K8s Smoke Tests
        id: smoke
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "=== Pods with non-Running/Completed status ==="
          UNHEALTHY=$(kubectl get pods -A --no-headers 2>/dev/null \
            | grep -vE '\s(Running|Completed|Succeeded)\s' || true)
          if [ -n "$UNHEALTHY" ]; then
            echo "$UNHEALTHY"
            echo "::warning::Some pods are not in Running/Completed state"
          else
            echo "[OK] All pods Running or Completed"
          fi

          echo ""
          echo "=== ArgoCD Application Health ==="
          DEGRADED=$(kubectl get applications -n argocd --no-headers 2>/dev/null \
            | awk '$3!="Synced" && $3!="OutOfSync"' || true)
          if [ -n "$DEGRADED" ]; then
            echo "$DEGRADED"
            echo "::warning::Some ArgoCD applications are in an unexpected sync state"
          else
            echo "[OK] All applications Synced or OutOfSync"
          fi

          echo ""
          echo "=== Managed Service Namespaces ==="
          for ns in nextjs-app start-admin admin-api public-api argocd; do
            if kubectl get namespace "$ns" &>/dev/null; then
              echo "  [OK] $ns"
            else
              echo "  [WARN] Namespace $ns not found"
            fi
          done

      # -----------------------------------------------------------------------
      # Failure Diagnostics (direct kubectl — no SSM hop)
      # -----------------------------------------------------------------------
      - name: "Capture Failure Diagnostics"
        if: failure()
        continue-on-error: true
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "## Failure Diagnostics" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment**: ${{ inputs.environment }} | **Commit**: ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "### K8s Pod Status (non-Running)" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          kubectl get pods -A --field-selector=status.phase!=Running \
            -o wide 2>/dev/null >> $GITHUB_STEP_SUMMARY \
            || echo "kubectl unavailable" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY

          CONFIG_EXEC_ARN="${{ needs.inject-config.outputs.config_execution_arn }}"
          if [ -n "$CONFIG_EXEC_ARN" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### SM-B Execution Reference" >> $GITHUB_STEP_SUMMARY
            echo "\`${CONFIG_EXEC_ARN}\`" >> $GITHUB_STEP_SUMMARY
          fi
