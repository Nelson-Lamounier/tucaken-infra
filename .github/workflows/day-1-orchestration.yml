# @format
# @description Day-1 Orchestration Pipeline — Release Coordinator
#
# Single-trigger workflow that deploys the entire K8s platform from scratch.
# Chains all existing reusable workflows in dependency order:
#
#   Phase 1: Foundation  →  Shared VPC + Security + FinOps  (_deploy-stack.yml × 3)
#   Phase 2: K8s Infra   →  9-stack K8s deployment          (_deploy-kubernetes.yml)
#   Phase 3: Summary     →  Aggregated results               (inline)
#
# Each phase is gated on the previous phase's success.
# Each phase is independently toggleable via workflow_dispatch inputs.
#
# Safety:
#   - Manual-only trigger (no push/schedule)
#   - Requires typing "DEPLOY-DAY1" to confirm
#   - Concurrency group prevents parallel Day-1 runs per environment

name: "Day-1 Orchestration"

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
        default: development
      confirm:
        description: "Type DEPLOY-DAY1 to confirm"
        required: true
        type: string
      deploy-shared:
        description: "Phase 1: Deploy Shared VPC + ECR"
        required: false
        type: boolean
        default: true
      deploy-kubernetes:
        description: "Phase 2: Deploy K8s Infrastructure"
        required: false
        type: boolean
        default: true
      skip-verification:
        description: "Skip post-deployment smoke tests"
        required: false
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read
  attestations: write

concurrency:
  group: day-1-orchestration-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Gate — Confirmation + Environment Resolution
  # ===========================================================================
  gate:
    name: "Confirm & Resolve"
    runs-on: ubuntu-latest
    timeout-minutes: 2
    outputs:
      cdk-environment: ${{ steps.resolve.outputs.cdk-environment }}
      require-approval: ${{ steps.resolve.outputs.require-approval }}
      shared-stack-name: ${{ steps.resolve.outputs.shared-stack-name }}
      security-stack-name: ${{ steps.resolve.outputs.security-stack-name }}
      finops-stack-name: ${{ steps.resolve.outputs.finops-stack-name }}

    steps:
      - name: Validate Confirmation
        if: inputs.confirm != 'DEPLOY-DAY1'
        run: |
          echo "::error::Confirmation failed. You must type 'DEPLOY-DAY1' to proceed."
          echo "  Received: '${{ inputs.confirm }}'"
          exit 1

      - name: Resolve Environment Settings
        id: resolve
        run: |
          ENV="${{ inputs.environment }}"

          case "$ENV" in
            development)
              echo "cdk-environment=development" >> $GITHUB_OUTPUT
              echo "require-approval=never" >> $GITHUB_OUTPUT
              echo "shared-stack-name=Shared-Infra-development" >> $GITHUB_OUTPUT
              echo "security-stack-name=Shared-SecurityBaseline-development" >> $GITHUB_OUTPUT
              echo "finops-stack-name=Shared-FinOps-development" >> $GITHUB_OUTPUT
              ;;
            staging|production)
              echo "::error::Only development environment is supported."
              exit 1
              ;;
          esac

          echo ""
          echo "## Day-1 Orchestration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Setting | Value |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| **Environment** | $ENV |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Shared** | ${{ inputs.deploy-shared }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy K8s** | ${{ inputs.deploy-kubernetes }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Skip Verification** | ${{ inputs.skip-verification }} |" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Phase 1: Foundation — Shared VPC + Security Baseline + FinOps
  # All three stacks are independent and deploy in parallel.
  # ===========================================================================
  deploy-shared:
    name: "Phase 1a: Shared VPC"
    needs: gate
    if: inputs.deploy-shared
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.gate.outputs.shared-stack-name }}
      project: shared
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ needs.gate.outputs.require-approval }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  deploy-security:
    name: "Phase 1b: Security Baseline"
    needs: gate
    if: inputs.deploy-shared
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.gate.outputs.security-stack-name }}
      project: shared
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ needs.gate.outputs.require-approval }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  deploy-finops:
    name: "Phase 1c: FinOps"
    needs: gate
    if: inputs.deploy-shared
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: ${{ needs.gate.outputs.finops-stack-name }}
      project: shared
      environment: ${{ inputs.environment }}
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: ${{ needs.gate.outputs.require-approval }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Phase 2: K8s Infrastructure — 9-Stack Deployment
  #
  # Internally orchestrates: Data → Base → ControlPlane → GeneralPool → MonitoringPool → AppIam → Api → Edge → Observability
  # See _deploy-kubernetes.yml for the full internal graph.
  # ===========================================================================
  deploy-kubernetes:
    name: "Phase 2: K8s Infra"
    needs: [gate, deploy-shared, deploy-security, deploy-finops]
    if: >-
      always()
      && inputs.deploy-kubernetes
      && (needs.deploy-shared.result == 'success' || needs.deploy-shared.result == 'skipped')
      && (needs.deploy-security.result == 'success' || needs.deploy-security.result == 'skipped')
      && (needs.deploy-finops.result == 'success' || needs.deploy-finops.result == 'skipped')
    uses: ./.github/workflows/_deploy-kubernetes.yml
    with:
      environment: ${{ inputs.environment }}
      cdk-environment: ${{ needs.gate.outputs.cdk-environment }}
      require-approval: ${{ needs.gate.outputs.require-approval }}
      skip-verification: ${{ inputs.skip-verification }}
    secrets: inherit

  # ===========================================================================
  # Phase 3: Orchestration Summary
  # ===========================================================================
  summary:
    name: "Orchestration Summary"
    needs: [gate, deploy-shared, deploy-security, deploy-finops, deploy-kubernetes]
    runs-on: ubuntu-latest
    timeout-minutes: 2
    if: always()

    steps:
      - name: Generate Summary
        run: |
          echo "## Day-1 Orchestration — Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Phase | Job | Result |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|-----|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Gate | Confirm & Resolve | \`${{ needs.gate.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 1a. Foundation | Shared VPC + ECR | \`${{ needs.deploy-shared.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 1b. Foundation | Security Baseline | \`${{ needs.deploy-security.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 1c. Foundation | FinOps | \`${{ needs.deploy-finops.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| 2. K8s Infra | 9-Stack Deploy | \`${{ needs.deploy-kubernetes.result }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Overall verdict
          if [[ "${{ needs.gate.result }}" == "success" ]] \
            && [[ "${{ needs.deploy-shared.result }}" =~ ^(success|skipped)$ ]] \
            && [[ "${{ needs.deploy-security.result }}" =~ ^(success|skipped)$ ]] \
            && [[ "${{ needs.deploy-finops.result }}" =~ ^(success|skipped)$ ]] \
            && [[ "${{ needs.deploy-kubernetes.result }}" =~ ^(success|skipped)$ ]]; then
            echo "### ✅ Day-1 Orchestration Complete" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "All phases completed successfully for **${{ inputs.environment }}**." >> $GITHUB_STEP_SUMMARY
          else
            echo "### ❌ Day-1 Orchestration Failed" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "One or more phases failed for **${{ inputs.environment }}**. Review the job logs above." >> $GITHUB_STEP_SUMMARY
            echo "::error::Day-1 orchestration did not complete successfully"
          fi

  deploy-marker:
    name: Loki deploy marker
    needs: [gate, deploy-shared, deploy-security, deploy-finops, deploy-kubernetes, summary]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
        with:
          service:     cdk-day-1
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "Day-1 orchestration (shared+security+finops+k8s)"
