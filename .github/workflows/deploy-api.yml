# =============================================================================
# Orchestrator: Deploy BFF API Services (Development)
# =============================================================================
#
# CI/CD pipeline for the Node.js BFF services that live in this repo:
#   api/admin-api/  — Cognito-protected write API (articles, assets, lambdas)
#   api/public-api/ — Public read API (article listing, slugs, healthcheck)
#
# Unlike deploy-frontend.yml, both services are built FROM THIS REPO (no
# cross-repo checkout required — there is no CROSS_REPO_PAT dependency).
#
# Trigger methods:
#   1. Push to develop with changes under api/admin-api/** or api/public-api/**
#   2. Manual: workflow_dispatch — choose which service(s) to redeploy
#   3. Called by _deploy-kubernetes.yml (future: post-infra-bootstrap)
#
# Parallel deployment paths:
#   ┌── build-admin-api → push-admin-api → deploy-admin-api ─────┐
#   │                                                             ├── summary
#   └── build-public-api → push-public-api → deploy-public-api ──┘
#        (independent — no ordering between the two services)
#
# ECR repos (created by CDK SharedVpcStack):
#   admin-api  → SSM: /shared/ecr-admin-api/{env}/repository-uri
#   public-api → SSM: /shared/ecr-public-api/{env}/repository-uri
#
# ArgoCD sync (via SSM image-uri parameters):
#   admin-api  → /admin-api/{env}/image-uri
#   public-api → /public-api/{env}/image-uri
#
# Note: The BFF services use plain Deployments (not Argo Rollouts), so there
# is no promote step. ArgoCD detects the new image-uri and rolling-updates
# the Deployment directly.
# =============================================================================

name: "Deploy BFF APIs (Dev)"

on:
  push:
    branches:
      - develop
    paths:
      - "api/admin-api/**"
      - "api/public-api/**"

  workflow_dispatch:
    inputs:
      apps:
        description: "Which BFF services to deploy (both | admin-api | public-api)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - admin-api
          - public-api

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Composite tag prevents ECR overwrites on pipeline retries
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

# ===========================================================================
# Concurrency: only one API deployment per ref at a time.
# ===========================================================================
concurrency:
  group: deploy-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Resolve which services to deploy based on trigger + changed paths
  # ===========================================================================
  resolve-targets:
    name: Resolve Deploy Targets
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      deploy-admin-api: ${{ steps.targets.outputs.deploy-admin-api }}
      deploy-public-api: ${{ steps.targets.outputs.deploy-public-api }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 2 # Need parent commit to detect which paths changed

      - name: Compute targets
        id: targets
        run: |
          APPS="${{ github.event.inputs.apps || 'both' }}"

          # For push events with path filters: apply changed-path logic.
          # For workflow_dispatch: honour the explicit `apps` input.
          if [[ "${{ github.event_name }}" == "push" ]]; then
            CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || echo "")
            echo "Changed files:"
            echo "$CHANGED"

            # If anything under api/admin-api changed, include it
            if echo "$CHANGED" | grep -q "^api/admin-api/"; then
              DEPLOY_ADMIN_API="true"
            else
              DEPLOY_ADMIN_API="false"
            fi

            # If anything under api/public-api changed, include it
            if echo "$CHANGED" | grep -q "^api/public-api/"; then
              DEPLOY_PUBLIC_API="true"
            else
              DEPLOY_PUBLIC_API="false"
            fi
          else
            # Manual trigger — honour apps input
            case "$APPS" in
              admin-api)
                DEPLOY_ADMIN_API="true"
                DEPLOY_PUBLIC_API="false"
                ;;
              public-api)
                DEPLOY_ADMIN_API="false"
                DEPLOY_PUBLIC_API="true"
                ;;
              *)
                DEPLOY_ADMIN_API="true"
                DEPLOY_PUBLIC_API="true"
                ;;
            esac
          fi

          echo "deploy-admin-api=$DEPLOY_ADMIN_API" >> $GITHUB_OUTPUT
          echo "deploy-public-api=$DEPLOY_PUBLIC_API" >> $GITHUB_OUTPUT
          echo "Deploy targets: admin-api=$DEPLOY_ADMIN_API, public-api=$DEPLOY_PUBLIC_API"

  # ===========================================================================
  # ── ADMIN-API ───────────────────────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Job: Build admin-api Docker image
  # Build context is the REPO ROOT so that `yarn workspaces focus` can locate
  # the workspace root package.json. The Dockerfile uses `WORKDIR /app` and
  # COPY paths relative to the repo root.
  # ---------------------------------------------------------------------------
  build-admin-api:
    name: "[Admin API] Build Docker Image"
    needs: [resolve-targets]
    if: needs.resolve-targets.outputs.deploy-admin-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (admin-api)
        uses: docker/build-push-action@v6
        with:
          # Build context MUST be the repo root — the Dockerfile references
          # workspace root manifests (package.json, yarn.lock, .yarn/).
          context: .
          file: api/admin-api/Dockerfile
          push: false
          load: false
          tags: admin-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=admin-api
          cache-to: type=gha,mode=max,scope=admin-api
          provenance: false
          outputs: type=docker,dest=/tmp/admin-api-image.tar

      - name: Cache Admin-API Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/admin-api-image.tar | cut -f1)
          echo "## [Admin API] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: api/admin-api/Dockerfile" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Push admin-api image to ECR
  # ---------------------------------------------------------------------------
  push-admin-api:
    name: "[Admin API] Push to ECR"
    needs: [resolve-targets, build-admin-api]
    if: needs.resolve-targets.outputs.deploy-admin-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Admin-API Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          docker load -i /tmp/admin-api-image.tar
          echo "[PASS] admin-api image loaded"

      - name: Resolve ECR URL (admin-api)
        id: resolve-ecr
        run: |
          # SSM path created by CDK SharedVpcStack AdminApiEcrRepository block:
          #   /shared/ecr-admin-api/{env}/repository-uri
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::admin-api ECR URL not found at /shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri"
            echo "::error::Ensure the CDK VPC stack has been deployed with createAdminApiEcrRepository=true"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Admin-API Image to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_URL"

          docker tag "admin-api:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

          echo "[PASS] admin-api image pushed: ${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Admin API] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Write image URI to SSM so ArgoCD Image Updater picks it up
  # ---------------------------------------------------------------------------
  deploy-admin-api:
    name: "[Admin API] Update SSM → ArgoCD"
    needs: [resolve-targets, push-admin-api]
    if: needs.resolve-targets.outputs.deploy-admin-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          # ArgoCD Image Updater polls this SSM parameter for the admin-api app.
          # The parameter name matches the annotation in the admin-api ArgoCD Application:
          #   argocd-image-updater.argoproj.io/image-list: admin-api=<ecr-uri>
          aws ssm put-parameter \
            --name "/admin-api/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

          echo "[PASS] admin-api image URI written to SSM — ArgoCD will rolling-update the Deployment"



      # -------------------------------------------------------------------------
      # Sync deploy scripts to S3 so the control-plane instance runs the
      # version from this commit, not whatever was cached from the last
      # _deploy-ssm-automation.yml run.
      # -------------------------------------------------------------------------
      - name: Sync Admin-API Scripts to S3
        run: |
          SCRIPTS_BUCKET=$(aws ssm get-parameter \
            --name "/k8s/${{ env.ENVIRONMENT }}/scripts-bucket" \
            --query 'Parameter.Value' \
            --output text)

          echo "Syncing k8s-bootstrap helpers..."
          aws s3 sync kubernetes-app/k8s-bootstrap/ \
            "s3://${SCRIPTS_BUCKET}/k8s-bootstrap/" \
            --region "${{ env.AWS_REGION }}"

          echo "Syncing admin-api deploy scripts..."
          aws s3 sync kubernetes-app/workloads/charts/admin-api/ \
            "s3://${SCRIPTS_BUCKET}/app-deploy/admin-api/" \
            --exclude "chart/*" --exclude "__pycache__/*" \
            --region "${{ env.AWS_REGION }}"

          echo "[PASS] admin-api scripts synced to s3://${SCRIPTS_BUCKET}/app-deploy/admin-api/"

      # -------------------------------------------------------------------------
      # Bootstrap admin-api K8s resources via deploy.py.
      #
      # deploy.py creates:
      #   admin-api-secrets  (Opaque Secret)  — Cognito auth creds
      #   admin-api-config   (ConfigMap)      — DynamoDB, S3, Lambda refs
      #   admin-api          (IngressRoute)   — Traefik routing rule
      #
      # The script is the sole owner of these resources. ArgoCD only manages
      # the Deployment, Service, NetworkPolicy, and ResourceQuota via Helm.
      #
      # The SSM command fetches the scripts bucket from SSM and syncs the
      # latest deploy.py from S3 before executing, ensuring the instance
      # always runs the version from this commit.
      # -------------------------------------------------------------------------
      - name: Run admin-api deploy.py via SSM (Secret + ConfigMap + IngressRoute)
        env:
          REGION: ${{ env.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "$REGION" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Control-plane instance not found — cannot run admin-api deploy.py"
            exit 1
          fi

          echo "::add-mask::$INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BUCKET=$(aws ssm get-parameter --name /k8s/development/scripts-bucket --query Parameter.Value --output text --region eu-west-1 2>/dev/null || echo \"\")",
              "[ -n \"$BUCKET\" ] && aws s3 sync s3://$BUCKET/k8s-bootstrap/ /data/k8s-bootstrap/ --region eu-west-1 2>&1 && aws s3 sync s3://$BUCKET/app-deploy/admin-api/ /data/app-deploy/admin-api/ --region eu-west-1 2>&1 && echo \"[S3] scripts refreshed\" || echo \"[WARN] S3 sync skipped\"",
              "KUBECONFIG=/etc/kubernetes/admin.conf python3 /data/app-deploy/admin-api/deploy.py 2>&1"
            ]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "SSM command: $CMD_ID"

          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] deploy.py status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          echo "--- deploy.py output ---"
          echo "$OUTPUT"

          if [[ "$STATUS" != "Success" ]]; then
            echo "::error::admin-api deploy.py failed with status: $STATUS"
            echo "::error::Ensure SSM parameters exist: /nextjs/development/auth/cognito-* and /bedrock-dev/*"
            exit 1
          fi

      - name: Force ArgoCD Sync via SSM
        # ArgoCD Image Updater may take up to 2 minutes to poll SSM.
        # Trigger an immediate force-sync on the CP node to avoid waiting.
        env:
          REGION: ${{ env.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "$REGION" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::warning::Could not resolve control-plane instance — skipping force-sync"
            exit 0
          fi

          echo "::add-mask::$INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo kubectl -n argocd exec deploy/argocd-server -- argocd app sync admin-api --force 2>&1 || sudo argocd app sync admin-api --grpc-web 2>&1 || echo [WARN] force-sync skipped — Image Updater will poll within 2 min"]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "SSM force-sync command: $CMD_ID"

          for i in $(seq 1 15); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] SSM status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          echo "--- Remote output ---"
          echo "$OUTPUT"

      - name: Deploy Summary
        run: |
          echo "## [Admin API] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM Parameter**: \`/admin-api/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and rolling-update the admin-api Deployment." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # ── PUBLIC-API ──────────────────────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Job: Build public-api Docker image
  # ---------------------------------------------------------------------------
  build-public-api:
    name: "[Public API] Build Docker Image"
    needs: [resolve-targets]
    if: needs.resolve-targets.outputs.deploy-public-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (public-api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/public-api/Dockerfile
          push: false
          load: false
          tags: public-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=public-api
          cache-to: type=gha,mode=max,scope=public-api
          provenance: false
          outputs: type=docker,dest=/tmp/public-api-image.tar

      - name: Cache Public-API Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/public-api-image.tar
          key: public-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/public-api-image.tar | cut -f1)
          echo "## [Public API] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: api/public-api/Dockerfile" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Push public-api image to ECR
  # ---------------------------------------------------------------------------
  push-public-api:
    name: "[Public API] Push to ECR"
    needs: [resolve-targets, build-public-api]
    if: needs.resolve-targets.outputs.deploy-public-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: write   # Required: commits .argocd-source-public-api.yaml back to develop

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Public-API Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/public-api-image.tar
          key: public-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          docker load -i /tmp/public-api-image.tar
          echo "[PASS] public-api image loaded"

      - name: Resolve ECR URL (public-api)
        id: resolve-ecr
        run: |
          # SSM path created by CDK SharedVpcStack PublicApiEcrRepository block:
          #   /shared/ecr-public-api/{env}/repository-uri
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-public-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::public-api ECR URL not found at /shared/ecr-public-api/${{ env.ENVIRONMENT }}/repository-uri"
            echo "::error::Ensure the CDK VPC stack has been deployed with createPublicApiEcrRepository=true"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Public-API Image to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_URL"

          docker tag "public-api:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

          echo "[PASS] public-api image pushed: ${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Public API] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Write image URI to SSM so ArgoCD Image Updater picks it up
  # ---------------------------------------------------------------------------
  deploy-public-api:
    name: "[Public API] Update SSM → ArgoCD"
    needs: [resolve-targets, push-public-api]
    if: needs.resolve-targets.outputs.deploy-public-api == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-public-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          aws ssm put-parameter \
            --name "/public-api/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

          echo "[PASS] public-api image URI written to SSM — ArgoCD will rolling-update the Deployment"



      # -------------------------------------------------------------------------
      # Sync deploy scripts to S3 so the control-plane instance runs the
      # version from this commit, not whatever was cached from the last
      # _deploy-ssm-automation.yml run.
      # -------------------------------------------------------------------------
      - name: Sync Public-API Scripts to S3
        run: |
          SCRIPTS_BUCKET=$(aws ssm get-parameter \
            --name "/k8s/${{ env.ENVIRONMENT }}/scripts-bucket" \
            --query 'Parameter.Value' \
            --output text)

          echo "Syncing k8s-bootstrap helpers..."
          aws s3 sync kubernetes-app/k8s-bootstrap/ \
            "s3://${SCRIPTS_BUCKET}/k8s-bootstrap/" \
            --region "${{ env.AWS_REGION }}"

          echo "Syncing public-api deploy scripts..."
          aws s3 sync kubernetes-app/workloads/charts/public-api/ \
            "s3://${SCRIPTS_BUCKET}/app-deploy/public-api/" \
            --exclude "chart/*" --exclude "__pycache__/*" \
            --region "${{ env.AWS_REGION }}"

          echo "[PASS] public-api scripts synced to s3://${SCRIPTS_BUCKET}/app-deploy/public-api/"

      # -------------------------------------------------------------------------
      # Bootstrap public-api K8s resources via deploy.py.
      #
      # deploy.py creates:
      #   public-api-config  (ConfigMap)   — DynamoDB table names, region
      #   public-api         (IngressRoute) — Traefik /api/* routing rule
      #
      # The SSM command fetches the scripts bucket from SSM and syncs the
      # latest deploy.py from S3 before executing.
      # -------------------------------------------------------------------------
      - name: Run public-api deploy.py via SSM (ConfigMap + IngressRoute)
        env:
          REGION: ${{ env.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "$REGION" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Control-plane instance not found — cannot run public-api deploy.py"
            exit 1
          fi

          echo "::add-mask::$INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=[
              "BUCKET=$(aws ssm get-parameter --name /k8s/development/scripts-bucket --query Parameter.Value --output text --region eu-west-1 2>/dev/null || echo \"\")",
              "[ -n \"$BUCKET\" ] && aws s3 sync s3://$BUCKET/k8s-bootstrap/ /data/k8s-bootstrap/ --region eu-west-1 2>&1 && aws s3 sync s3://$BUCKET/app-deploy/public-api/ /data/app-deploy/public-api/ --region eu-west-1 2>&1 && echo \"[S3] scripts refreshed\" || echo \"[WARN] S3 sync skipped\"",
              "KUBECONFIG=/etc/kubernetes/admin.conf python3 /data/app-deploy/public-api/deploy.py 2>&1"
            ]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "SSM command: $CMD_ID"

          for i in $(seq 1 18); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] deploy.py status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          echo "--- deploy.py output ---"
          echo "$OUTPUT"

          if [[ "$STATUS" != "Success" ]]; then
            echo "::error::public-api deploy.py failed with status: $STATUS"
            echo "::error::Ensure SSM parameters exist: /bedrock-dev/* and /nextjs/development/*"
            exit 1
          fi

      - name: Force ArgoCD Sync via SSM
        env:
          REGION: ${{ env.AWS_REGION }}
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "$REGION" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::warning::Could not resolve control-plane instance — skipping force-sync"
            exit 0
          fi

          echo "::add-mask::$INSTANCE_ID"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters 'commands=["sudo kubectl -n argocd exec deploy/argocd-server -- argocd app sync public-api --force 2>&1 || echo [WARN] force-sync skipped — Image Updater will poll within 2 min"]' \
            --region "$REGION" \
            --query "Command.CommandId" --output text)

          echo "SSM force-sync command: $CMD_ID"

          for i in $(seq 1 15); do
            sleep 5
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] SSM status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          echo "--- Remote output ---"
          echo "$OUTPUT"

      - name: Deploy Summary
        run: |
          echo "## [Public API] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM Parameter**: \`/public-api/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and rolling-update the public-api Deployment." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Summary
  # ===========================================================================
  summary:
    name: "Deployment Summary"
    needs:
      - resolve-targets
      - deploy-admin-api
      - deploy-public-api
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Final Summary
        run: |
          echo "# BFF API Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY

          ADMIN_STATUS="${{ needs.deploy-admin-api.result }}"
          PUBLIC_STATUS="${{ needs.deploy-public-api.result }}"

          [[ "$ADMIN_STATUS" == "success" ]] && ADMIN_ICON="✅" || ADMIN_ICON="⏭️ (skipped or failed)"
          [[ "$PUBLIC_STATUS" == "success" ]] && PUBLIC_ICON="✅" || PUBLIC_ICON="⏭️ (skipped or failed)"

          echo "| admin-api  | ${ADMIN_ICON} ${ADMIN_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "| public-api | ${PUBLIC_ICON} ${PUBLIC_STATUS} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image tag**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "⚠️ Prerequisite: CDK VPC stack must be deployed with BFF ECR repos enabled." >> $GITHUB_STEP_SUMMARY
          echo "Expected SSM paths:" >> $GITHUB_STEP_SUMMARY
          echo "- \`/shared/ecr-admin-api/development/repository-uri\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`/shared/ecr-public-api/development/repository-uri\`" >> $GITHUB_STEP_SUMMARY
