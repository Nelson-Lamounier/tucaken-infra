# =============================================================================
# Orchestrator: Deploy Admin API (Development)
# =============================================================================
#
# CI/CD pipeline for the Cognito-protected admin API:
#   api/admin-api/ — Cognito JWT auth + admin CRUD (articles, assets, drafts,
#                    content, pipelines, resumes, finops, comments)
#
# Used exclusively by the start-admin application running on the K8s cluster.
#
# Public API (articles, chatbot proxy, tags, resumes) has been moved to Lambda
# in the ai-applications repo and is deployed via deploy-bedrock.yml there.
#
# Trigger methods:
#   1. Push to develop with changes under api/admin-api/**
#   2. Manual: workflow_dispatch
#
# Deployment path:
#   build-admin-api → push-admin-api → deploy-admin-api
#
# ECR repo (created by CDK SharedVpcStack):
#   admin-api → SSM: /shared/ecr-admin-api/{env}/repository-uri
#
# ArgoCD sync (via SSM image-uri parameter):
#   admin-api → /admin-api/{env}/image-uri
# =============================================================================

name: "Deploy Admin API (Dev)"

on:
  push:
    branches:
      - develop
    paths:
      - "api/admin-api/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

concurrency:
  group: deploy-admin-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job: Build admin-api Docker image
  # ===========================================================================
  build-admin-api:
    name: "[Admin API] Build Docker Image"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (admin-api)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: api/admin-api/Dockerfile
          push: false
          load: false
          tags: admin-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=admin-api
          cache-to: type=gha,mode=max,scope=admin-api
          provenance: false
          outputs: type=docker,dest=/tmp/admin-api-image.tar

      - name: Cache Admin-API Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/admin-api-image.tar | cut -f1)
          echo "## [Admin API] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: api/admin-api/Dockerfile" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Push admin-api image to ECR
  # ===========================================================================
  push-admin-api:
    name: "[Admin API] Push to ECR"
    needs: [build-admin-api]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Admin-API Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: docker load -i /tmp/admin-api-image.tar

      - name: Resolve ECR URL (admin-api)
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::admin-api ECR URL not found — deploy CDK SharedVpcStack first"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Admin-API Image to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_URL"

          docker tag "admin-api:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Admin API] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Write image URI to SSM + apply K8s resources via in-cluster runner
  # ===========================================================================
  deploy-admin-api:
    name: "[Admin API] Update SSM → ArgoCD"
    needs: [push-admin-api]
    runs-on: k8s-runner
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)
          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          aws ssm put-parameter \
            --name "/admin-api/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

      - name: Set up in-cluster kubeconfig
        run: |
          aws ssm get-parameter \
            --name "/k8s/${{ env.ENVIRONMENT }}/kubeconfig" \
            --with-decryption \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameter.Value' \
            --output text \
            | sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc:443|g' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Apply admin-api K8s resources
        env:
          KUBECONFIG: /tmp/kubeconfig
          AWS_DEFAULT_REGION: ${{ env.AWS_REGION }}
          PYTHONPATH: kubernetes-app/k8s-bootstrap
        run: |
          python3 -m venv /tmp/deploy-venv
          /tmp/deploy-venv/bin/pip install -q -r kubernetes-app/k8s-bootstrap/deploy_helpers/requirements.txt
          /tmp/deploy-venv/bin/python3 kubernetes-app/workloads/charts/admin-api/deploy.py

      - name: Trigger ArgoCD Sync
        run: |
          kubectl annotate application admin-api -n argocd \
            argocd.argoproj.io/refresh=hard --overwrite \
            --kubeconfig /tmp/kubeconfig

      - name: Deploy Summary
        run: |
          echo "## [Admin API] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM**: \`/admin-api/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
