# =============================================================================
# Build + Push Admin API Image to ECR (Development)
# =============================================================================
#
# Builds api/admin-api/ and pushes to the admin-api ECR repository.
# That's it — no SSM writes, no kubectl, no deploy.py.
#
# Why no Kubernetes-level steps in this workflow:
#   ArgoCD Image Updater (cluster-resident, configured on the admin-api
#   ApplicationSet in kubernetes-bootstrap argocd-apps/admin-api.yaml) polls
#   ECR and writes the new tag into .argocd-source-admin-api.yaml. ArgoCD
#   reconciles the generated Application, Helm renders the Rollout with the
#   new image, and Argo Rollouts drives Blue/Green pre-promotion analysis
#   (Prometheus error-rate + P95 latency from Traefik metrics). Manual
#   promotion is `kubectl argo rollouts promote admin-api -n admin-api`
#   (or a workflow_dispatch in kubernetes-bootstrap on the in-cluster ARC
#   runner — that repo owns all K8s-level operations now).
#
# The previous deploy-admin-api job was removed in favour of this GitOps
# flow. It used to run on the k8s-runner ARC, write /admin-api/{env}/image-uri
# to SSM, and shell out to deploy.py — all three are obsolete:
#   - admin-api image is tracked by Image Updater on its own ECR repo.
#   - The 3 Job images use a different SSM path (/k8s/{env}/job-images/{app})
#     written by the ai-applications workflows; consumed by ESO.
#   - deploy.py was decommissioned post-Phase-2.
#
# Trigger methods:
#   1. Push to develop with changes under api/admin-api/**
#   2. Manual: workflow_dispatch
#
# Workflow path:
#   build-admin-api → push-admin-api
# After ECR push (no GHA runner):
#   Image Updater → ArgoCD reconcile → Argo Rollouts Blue/Green
#
# ECR repo (provisioned by CDK SharedVpcStack):
#   admin-api → SSM: /shared/ecr-admin-api/{env}/repository-uri
# =============================================================================

name: "Build + Push Admin API (Dev)"

on:
  push:
    branches:
      - develop
    paths:
      - "api/admin-api/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

concurrency:
  group: build-admin-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job: Build admin-api Docker image
  # ===========================================================================
  build-admin-api:
    name: "[Admin API] Build Docker Image"
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image (admin-api)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/admin-api/Dockerfile
          push: false
          load: false
          tags: admin-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=admin-api
          cache-to: type=gha,mode=max,scope=admin-api
          provenance: false
          outputs: type=docker,dest=/tmp/admin-api-image.tar

      - name: Cache Admin-API Image
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/admin-api-image.tar | cut -f1)
          echo "## [Admin API] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: api/admin-api/Dockerfile" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Push admin-api image to ECR
  # ===========================================================================
  push-admin-api:
    name: "[Admin API] Push to ECR"
    needs: [build-admin-api]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Admin-API Image from Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: docker load -i /tmp/admin-api-image.tar

      - name: Resolve ECR URL (admin-api)
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::admin-api ECR URL not found — deploy CDK SharedVpcStack first"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Admin-API Image to ECR
        run: |
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_URL"

          docker tag "admin-api:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Admin API] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Picked up by**: ArgoCD Image Updater on admin-api ApplicationSet" >> $GITHUB_STEP_SUMMARY
          echo "- **Promotes via**: Argo Rollouts Blue/Green (manual gate)" >> $GITHUB_STEP_SUMMARY
