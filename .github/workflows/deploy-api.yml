# =============================================================================
# Build + Push + Promote Admin API (Development)
# =============================================================================
#
# Triggered on every push to main that touches api/**. After the image lands
# in ECR, ArgoCD Image Updater picks up the new tag, writes it back to
# kubernetes-bootstrap, and ArgoCD reconciles the admin-api Rollout.
# The promote job then waits for the Rollout to pause at the Blue/Green
# gate, issues the promotion, and watches to Healthy — mirroring the
# tucaken-app deploy pipeline.
#
# Workflow path:
#   build-admin-api → push-admin-api → promote → deploy-marker
#
# ArgoCD Image Updater annotations are on:
#   kubernetes-bootstrap/argocd-apps/eks/development/admin-api.yaml
# Write-back target:
#   kubernetes-bootstrap/charts/admin-api/chart/.argocd-source-admin-api.yaml
# =============================================================================

name: "Build + Push Admin API (Dev)"

on:
  push:
    branches:
      - main
    paths:
      - "api/**"

  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to deploy (branch, tag, SHA)"
        required: false
        default: "main"
        type: string
      no_cache:
        description: "Skip Docker layer cache (use for stale cache recovery)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

concurrency:
  group: build-admin-api-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Job: Resolve deploy ref (supports workflow_dispatch with custom ref)
  # ===========================================================================
  resolve-ref:
    name: Resolve Deploy Ref
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      ref: ${{ steps.targets.outputs.ref }}
    steps:
      - name: Compute ref
        id: targets
        env:
          INPUT_REF: ${{ github.event.inputs.ref }}
          EVENT_NAME: ${{ github.event_name }}
          PUSH_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "push" ]; then
            REF="$PUSH_SHA"
          else
            REF="${INPUT_REF:-main}"
          fi
          echo "ref=$REF" >> "$GITHUB_OUTPUT"
          echo "Deploy ref: $REF"

  # ===========================================================================
  # Job: Build admin-api Docker image
  # ===========================================================================
  build-admin-api:
    name: "[Admin API] Build Docker Image"
    needs: [resolve-ref]
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.resolve-ref.outputs.ref }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker Image (admin-api)
        uses: docker/build-push-action@v7
        with:
          context: .
          file: api/admin-api/Dockerfile
          push: false
          load: false
          tags: admin-api:${{ env.IMAGE_TAG }}
          cache-from: type=gha,scope=admin-api
          cache-to: type=gha,mode=max,scope=admin-api
          no-cache: ${{ github.event.inputs.no_cache == 'true' }}
          provenance: false
          outputs: type=docker,dest=/tmp/admin-api-image.tar

      - name: Cache Admin-API Image
        uses: actions/cache/save@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/admin-api-image.tar | cut -f1)
          echo "## [Admin API] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: api/admin-api/Dockerfile" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Push admin-api image to ECR
  # ===========================================================================
  push-admin-api:
    name: "[Admin API] Push to ECR"
    needs: [build-admin-api]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Admin-API Image from Cache
        uses: actions/cache/restore@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: /tmp/admin-api-image.tar
          key: admin-api-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: docker load -i /tmp/admin-api-image.tar

      - name: Resolve ECR URL (admin-api)
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin-api/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::admin-api ECR URL not found — deploy CDK SharedVpcStack first"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Admin-API Image to ECR
        env:
          ECR_URL: ${{ steps.resolve-ecr.outputs.ecr-url }}
        run: |
          TAG="${IMAGE_TAG}"
          aws ecr get-login-password --region "${AWS_REGION}" \
            | docker login --username AWS --password-stdin "${ECR_URL}"
          docker tag "admin-api:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Admin API] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Next**: Image Updater picks up tag → ArgoCD reconciles → Argo Rollouts Blue/Green" >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # Job: Wait for ArgoCD sync then promote admin-api Rollout to Healthy
  # ===========================================================================
  promote:
    name: Promote Rollout
    needs: [push-admin-api]
    runs-on: k8s-runner-cdk
    timeout-minutes: 20
    environment: development
    permissions:
      id-token: write
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up in-cluster kubeconfig
        run: |
          SA=/var/run/secrets/kubernetes.io/serviceaccount
          kubectl config set-cluster in-cluster \
            --server=https://kubernetes.default.svc:443 \
            --certificate-authority="${SA}/ca.crt"
          kubectl config set-credentials arc-runner \
            --token="$(cat ${SA}/token)"
          kubectl config set-context in-cluster \
            --cluster=in-cluster --user=arc-runner
          kubectl config use-context in-cluster

      # ── 0. Prometheus pre-flight ─────────────────────────────────────────────
      # Verifies Prometheus is healthy and the admin-api SLO recording rule
      # is present before the rollout starts — a silent Prometheus failure
      # would make the AnalysisRun error rather than fail cleanly.
      - name: Verify Prometheus is reachable
        env:
          PROM: "http://prometheus.monitoring.svc.cluster.local:9090/prometheus"
        run: |
          set -euo pipefail
          echo '── Prometheus health ──'
          curl -sf "${PROM}/-/healthy" && echo ' OK'

          echo '── SLO recording rule reachable ──'
          STATUS=$(curl -sf "${PROM}/api/v1/query?query=slo:admin-api:errors_ratio:rate5m" \
            | grep -o '"status":"[^"]*"' | head -1)
          if [ "$STATUS" != '"status":"success"' ]; then
            echo "FAIL: SLO recording rule query failed — Prometheus may be missing the rule"
            exit 1
          fi
          echo "SLO recording rule reachable: OK"

      # ── 1. Wait for Image Updater + ArgoCD sync ──────────────────────────────
      # Image Updater polls ECR every ~2 min, writes tag back to git (~15s),
      # ArgoCD reconciles (~30s). Budget: 40 × 15s = 10 min.
      - name: Wait for ArgoCD sync
        env:
          IMAGE_TAG_ENV: ${{ env.IMAGE_TAG }}
        run: |
          set -euo pipefail
          ROLLOUT="admin-api"
          NAMESPACE="admin-api"
          echo "Waiting for ArgoCD to reconcile image: *${IMAGE_TAG_ENV}*"
          for i in $(seq 1 40); do
            SPEC_IMAGE=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "<not found>")
            echo "[attempt ${i}/40] spec image: ${SPEC_IMAGE}"
            if [[ "$SPEC_IMAGE" == *"$IMAGE_TAG_ENV"* ]]; then
              echo "ArgoCD synced"
              break
            fi
            [[ "$i" -eq 40 ]] && {
              echo "FAIL: ArgoCD did not sync within 10 min"
              kubectl describe application -n argocd admin-api 2>/dev/null || true
              exit 1
            }
            sleep 15
          done

      # ── 2. Pre-promotion snapshot ─────────────────────────────────────────────
      - name: Snapshot rollout state
        run: kubectl argo rollouts get rollout admin-api -n admin-api

      # ── 3. Wait for Paused phase then promote ─────────────────────────────────
      - name: Wait for pre-promotion pause and promote
        run: |
          set -euo pipefail
          ROLLOUT="admin-api"
          NAMESPACE="admin-api"
          for i in $(seq 1 24); do
            PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
              -o jsonpath='{.status.phase}' 2>/dev/null || echo "unknown")
            MESSAGE=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
              -o jsonpath='{.status.message}' 2>/dev/null || echo "")
            echo "[attempt ${i}/24] phase=${PHASE}${MESSAGE:+ | ${MESSAGE}}"
            [[ "$PHASE" == "Paused" ]] && { echo "Rollout paused — promoting"; break; }
            [[ "$PHASE" == "Healthy" ]] && { echo "Already Healthy — no promotion needed"; exit 0; }
            [[ "$PHASE" == "Degraded" || "$PHASE" == "Error" ]] && {
              echo "FAIL: rollout entered ${PHASE} before promotion"
              kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE"
              exit 1
            }
            [[ "$i" -eq 24 ]] && {
              echo "FAIL: rollout did not pause within 6 min (phase=${PHASE})"
              kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE"
              exit 1
            }
            sleep 15
          done
          kubectl argo rollouts promote "$ROLLOUT" -n "$NAMESPACE"
          echo "Promote issued"

      # ── 4. Watch rollout to Healthy ───────────────────────────────────────────
      - name: Watch rollout to Healthy
        run: |
          set -euo pipefail
          kubectl argo rollouts status admin-api -n admin-api --timeout 10m
          echo "Rollout Healthy"

      # ── 5. Diagnostics on failure ─────────────────────────────────────────────
      - name: Dump diagnostics
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          GH_SHA: ${{ github.sha }}
        run: |
          ROLLOUT="admin-api"
          NAMESPACE="admin-api"

          echo "──────────────── rollout detail ────────────────"
          kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" || true

          echo "──────────────── rollout events ────────────────"
          kubectl get events -n "$NAMESPACE" \
            --field-selector "involvedObject.name=${ROLLOUT}" \
            --sort-by='.lastTimestamp' || true

          echo "──────────────── pods ──────────────────────────"
          kubectl get pods -n "$NAMESPACE" -o wide || true

          echo "──────────────── recent pod logs (last 50 lines) ───────────────"
          for POD in $(kubectl get pods -n "$NAMESPACE" \
            -l "app.kubernetes.io/name=${ROLLOUT}" \
            -o jsonpath='{.items[*].metadata.name}' 2>/dev/null); do
            echo "--- ${POD} ---"
            kubectl logs "$POD" -n "$NAMESPACE" --tail=50 2>/dev/null || true
          done

          echo "──────────────── analysis runs ─────────────────"
          kubectl get analysisrun -n "$NAMESPACE" \
            --sort-by='.metadata.creationTimestamp' 2>/dev/null | tail -5 || true

          DEPLOY_ID=$(gh api "/repos/${GH_REPO}/deployments" \
            --jq ".[] | select(.sha == \"${GH_SHA}\" and .environment == \"development\") | .id" \
            2>/dev/null | head -1 || echo "")
          if [ -n "$DEPLOY_ID" ]; then
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              "/repos/${GH_REPO}/deployments/${DEPLOY_ID}/statuses" \
              -f state=failure \
              -f description="Rollout did not become Healthy — see Actions log" \
              -f environment=development \
              2>/dev/null || true
          fi

  # ===========================================================================
  # Job: Loki deploy marker
  # ===========================================================================
  deploy-marker:
    name: Loki deploy marker
    needs: [build-admin-api, push-admin-api, promote]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     admin-api
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "admin-api deploy"
