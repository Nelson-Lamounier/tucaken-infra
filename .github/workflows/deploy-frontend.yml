# =============================================================================
# Orchestrator: Deploy Frontend Monorepo (Development)
# =============================================================================
#
# Unified CD pipeline for the Next.js (site) + TanStack Start (start-admin)
# monorepo hosted in the private frontend-portfolio repository.
#
# This pipeline lives in cdk-monitoring (infrastructure orchestrator) and
# checks out the private frontend-portfolio repo for building.
#
# Trigger methods:
#   1. Manual: workflow_dispatch from GitHub UI
#   2. Cross-repo: repository_dispatch from frontend-portfolio CI
#   3. Called by _deploy-kubernetes.yml post infrastructure deployment
#
# Parallel deployment paths:
#   ┌── build-site  → push-site  → sync-assets ─────────────────┐
#   │                            → deploy-site                   ├── summary
#   └── build-admin → push-admin → deploy-admin ────────────────┘
#                  (independent, no dependency between site & admin)
#
# Static asset sync (S3 / CloudFront) applies to `site` only.
# `start-admin` (TanStack Start) does not produce S3-hosted static assets.
# =============================================================================

name: "Deploy Frontend (Dev)"

on:
  # Manual trigger from GitHub UI
  workflow_dispatch:
    inputs:
      frontend-ref:
        description: "Git ref to build from frontend-portfolio (branch, tag, SHA)"
        required: false
        default: "main"
        type: string
      skip-migration:
        description: "Skip article migration"
        required: false
        default: false
        type: boolean
      apps:
        description: "Which apps to deploy (both | site | admin)"
        required: false
        default: "both"
        type: choice
        options:
          - both
          - site
          - admin

  # Cross-repo trigger from frontend-portfolio CI
  repository_dispatch:
    types: [deploy-nextjs-dev]

permissions:
  id-token: write
  contents: read

env:
  ENVIRONMENT: development
  AWS_REGION: "eu-west-1"
  # Force Node 24 for actions that haven't released Node 24-native versions yet
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  # Composite tag prevents ECR overwrites on pipeline retries
  IMAGE_TAG: "${{ github.sha }}-r${{ github.run_attempt }}"

# =============================================================================
# Concurrency: only one deployment per environment at a time.
# Cancel any in-progress run on the same ref (e.g. rapid pushes).
# =============================================================================
concurrency:
  group: deploy-frontend-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ===========================================================================
  # Resolve which apps to deploy
  # ===========================================================================
  resolve-targets:
    name: Resolve Deploy Targets
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      deploy-site: ${{ steps.targets.outputs.deploy-site }}
      deploy-admin: ${{ steps.targets.outputs.deploy-admin }}
      frontend-ref: ${{ steps.targets.outputs.frontend-ref }}

    steps:
      - name: Compute targets
        id: targets
        run: |
          # Determine which apps to build based on trigger
          APPS="${{ github.event.inputs.apps || 'both' }}"

          # repository_dispatch always deploys both unless payload specifies
          if [[ "${{ github.event_name }}" == "repository_dispatch" ]]; then
            PAYLOAD_APPS="${{ github.event.client_payload.apps }}"
            APPS="${PAYLOAD_APPS:-both}"
          fi

          case "$APPS" in
            site)
              echo "deploy-site=true" >> $GITHUB_OUTPUT
              echo "deploy-admin=false" >> $GITHUB_OUTPUT
              ;;
            admin)
              echo "deploy-site=false" >> $GITHUB_OUTPUT
              echo "deploy-admin=true" >> $GITHUB_OUTPUT
              ;;
            *)
              echo "deploy-site=true" >> $GITHUB_OUTPUT
              echo "deploy-admin=true" >> $GITHUB_OUTPUT
              ;;
          esac

          # Resolve frontend ref
          REF="${{ github.event.inputs.frontend-ref || github.event.client_payload.ref || 'main' }}"
          echo "frontend-ref=$REF" >> $GITHUB_OUTPUT

          echo "Deploy targets: apps=$APPS, ref=$REF"

  # ===========================================================================
  # ── SITE (Next.js) ──────────────────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Job: Build site Docker image (no AWS credentials needed)
  # ---------------------------------------------------------------------------
  build-site:
    name: "[Site] Build Docker Image"
    needs: [resolve-targets]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Nelson-Lamounier/frontend-portfolio
          ref: ${{ needs.resolve-targets.outputs.frontend-ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (site)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: false
          load: false
          tags: site:${{ env.IMAGE_TAG }}
          build-args: |
            APP_NAME=site
            NODE_ENV=production
            NEXT_TELEMETRY_DISABLED=1
            NEXT_PUBLIC_API_URL=${{ vars.NEXT_PUBLIC_API_URL }}
          cache-from: type=gha,scope=site
          cache-to: type=gha,mode=max,scope=site
          provenance: false
          outputs: type=docker,dest=/tmp/site-image.tar

      - name: Extract Static Assets (for S3 Sync)
        # frontend-portfolio uses a monorepo workspace layout. The runner stage
        # Dockerfile copies static assets into the workspace-namespaced path:
        #   COPY --from=builder /app/apps/${APP_NAME}/.next/static \
        #                       ./apps/${APP_NAME}/.next/static
        # So inside the container the real path is /app/apps/site/.next/static,
        # NOT the flat /app/.next/static that a single-app Next.js build would use.
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          docker load -i /tmp/site-image.tar
          TEMP=$(docker create "site:${IMAGE_TAG}")

          mkdir -p /tmp/next-static

          # Priority 1 — monorepo workspace path (what the Dockerfile produces)
          if docker cp "${TEMP}:/app/apps/site/.next/static" "/tmp/next-static/" 2>/dev/null; then
            echo "[PASS] Extracted from /app/apps/site/.next/static (monorepo layout)"

          # Priority 2 — standalone bundle without explicit static COPY
          elif docker cp "${TEMP}:/app/apps/site/.next/standalone/.next/static" "/tmp/next-static/" 2>/dev/null; then
            echo "[PASS] Extracted from /app/apps/site/.next/standalone/.next/static"

          else
            echo "::error::Could not find .next/static at any known path in the container."
            echo ""
            echo "--- All .next paths visible in the image (docker export | tar t) ---"
            # docker export works on a stopped/created container; no need to start it.
            # Filtering to .next paths keeps output tight even on large images.
            docker export "${TEMP}" | tar t 2>/dev/null \
              | grep -E "\.next" | head -60 \
              || echo "(export failed — check Docker daemon state)"
            echo ""
            echo "--- Expected Dockerfile runner stage ---"
            echo "  COPY --from=builder /app/apps/site/.next/static ./apps/site/.next/static"
            docker rm "${TEMP}" > /dev/null 2>&1 || true
            exit 1
          fi

          docker rm "${TEMP}" > /dev/null 2>&1 || true

          ASSET_COUNT=$(find /tmp/next-static -type f | wc -l | tr -d ' ')
          echo "[PASS] $ASSET_COUNT static assets ready for S3 sync"

      - name: Cache Static Assets
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/next-static
          key: site-static-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Cache Site Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/site-image.tar
          key: site-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/site-image.tar | cut -f1)
          ASSET_COUNT=$(find /tmp/next-static -type f | wc -l | tr -d ' ')
          echo "## [Site] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Static assets**: $ASSET_COUNT files" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: frontend-portfolio@${{ needs.resolve-targets.outputs.frontend-ref }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Push site image to ECR
  # ---------------------------------------------------------------------------
  push-site:
    name: "[Site] Push to ECR"
    needs: [resolve-targets, build-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Site Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/site-image.tar
          key: site-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          docker load -i /tmp/site-image.tar
          echo "[PASS] Site image loaded"

      - name: Resolve ECR URL (site)
        id: resolve-ecr
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::Site ECR URL not found at /shared/ecr/${{ env.ENVIRONMENT }}/repository-uri"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Site Image to ECR
        run: |
          npx tsx frontend-ops/push-to-ecr.ts \
            --env "${{ env.ENVIRONMENT }}" \
            --tag "${{ env.IMAGE_TAG }}" \
            --ecr-url "${{ steps.resolve-ecr.outputs.ecr-url }}" \
            --image-name "site:${{ env.IMAGE_TAG }}" \
            --skip-build \
            --skip-sync \
            --region "${{ env.AWS_REGION }}"

      - name: Push Summary
        run: |
          echo "## [Site] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Sync site static assets to S3 + invalidate CloudFront
  # (Runs in parallel with deploy-site — both need push-site)
  # ---------------------------------------------------------------------------
  sync-assets:
    name: "[Site] Sync Static Assets"
    needs: [resolve-targets, push-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    uses: ./.github/workflows/_sync-assets.yml
    with:
      environment: development
      # The build-site job extracts .next/static from the image and caches it
      # separately as a lightweight artifact. The sync job restores from this
      # static cache directly — bypassing the full image tar entirely.
      static-cache-path: /tmp/next-static
      static-cache-key-prefix: site-static
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ---------------------------------------------------------------------------
  # Job: Update SSM so ArgoCD Image Updater picks up the new site image
  # ---------------------------------------------------------------------------
  deploy-site:
    name: "[Site] Update SSM → ArgoCD"
    needs: [resolve-targets, push-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          aws ssm put-parameter \
            --name "/nextjs/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

          echo "[PASS] Site image URI written to SSM — ArgoCD Image Updater will promote"

      - name: Deploy Summary
        run: |
          echo "## [Site] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM Parameter**: \`/nextjs/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and trigger a BlueGreen promotion." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Promote the nextjs Rollout via SSM send-command
  #
  # WHY SSM, NOT direct kubectl:
  #   The K8s API server runs on a private EC2 instance inside the VPC.
  #   GitHub-hosted runners have no network path to it.  The SSM Agent on
  #   the control-plane node IS reachable via the SSM service endpoint
  #   (no inbound ports required), so the runner delegates every kubectl
  #   call to the node over the SSM channel — the same pattern used by
  #   every other kubectl step in this repo.
  #
  # Pattern (mirrors _post-bootstrap-config.yml):
  #   1. Resolve control-plane instance ID from EC2 tags.
  #   2. aws ssm send-command → AWS-RunShellScript → runs on the node.
  #   3. Poll ssm get-command-invocation for result + exit code.
  # ---------------------------------------------------------------------------
  promote-site:
    name: "[Site] Promote Rollout"
    needs: [resolve-targets, deploy-site]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Control-Plane Instance ID
        id: resolve-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "${{ env.AWS_REGION }}" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Could not resolve control-plane instance ID — ensure the EC2 instance has tag k8s:bootstrap-role=control-plane"
            exit 1
          fi

          echo "::add-mask::$INSTANCE_ID"
          echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for Rollout Paused + Promote (via SSM)
        env:
          INSTANCE_ID: ${{ steps.resolve-instance.outputs.instance-id }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          REGION="${{ env.AWS_REGION }}"

          # ---------------------------------------------------------------
          # The shell script that runs ON the control-plane node.
          # It polls for Paused, promotes, then waits for Healthy.
          # All output is captured and surfaced by get-command-invocation.
          #
          # __IMAGE_TAG__ is a placeholder substituted below (before SSM send)
          # because the heredoc uses single-quote delimiters to prevent
          # variable expansion on the GitHub runner.
          # ---------------------------------------------------------------
          SCRIPT=$(cat <<'REMOTE_SCRIPT'
          set -euo pipefail

          ROLLOUT="nextjs"
          NAMESPACE="nextjs-app"
          PLUGIN="/usr/local/bin/kubectl-argo-rollouts"
          EXPECTED_TAG="__IMAGE_TAG__"

          # Install the Argo Rollouts plugin if not already present on the node
          if ! sudo test -f "$PLUGIN"; then
            echo "[INFO] Installing kubectl-argo-rollouts plugin..."
            sudo curl -sSLo "$PLUGIN" \
              https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
            sudo chmod +x "$PLUGIN"
          fi

          # ─── Step 0: Wait for ArgoCD Image Updater to sync the new image ──────
          # ArgoCD polls SSM on its own schedule (30–180 s). We must not enter the
          # Paused loop until the rollout SPEC already references the new tag —
          # otherwise a still-Healthy rollout (old image) causes an early exit 0
          # that lets smoke-site see the wrong image.
          echo "[INFO] Waiting for ArgoCD to sync new image tag: $EXPECTED_TAG (up to 5 min)..."
          for i in $(seq 1 20); do
            SPEC_IMAGE=$(sudo kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
            if [[ "$SPEC_IMAGE" == *"$EXPECTED_TAG"* ]]; then
              echo "[PASS] ArgoCD synced new image: $SPEC_IMAGE"
              break
            fi
            echo "  [$i/20] Waiting for ArgoCD sync (spec: ${SPEC_IMAGE##*/:-none})..."
            if [[ "$i" -eq 20 ]]; then
              echo "[FAIL] ArgoCD did not sync new image within 5 min. Current spec: $SPEC_IMAGE"
              exit 1
            fi
            sleep 15
          done

          echo "[INFO] Waiting for $ROLLOUT Rollout to reach Paused state (green RS + analysis passed)..."
          for i in $(seq 1 24); do
            # $NF (last field) captures the status word, e.g. "Paused", "Healthy", "Degraded".
            # $2 would capture the icon glyph (✔/◌/✖) and never match any string comparison.
            PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
              | grep -E "^Status" | awk '{print $NF}' || true)
            echo "  [$i/24] Phase: ${PHASE:-unknown}"
            if [[ "$PHASE" == "Paused" ]]; then
              echo "[PASS] Rollout is Paused — promoting now"
              break
            fi
            # Healthy here means new image already promoted (e.g. manual re-run)
            if [[ "$PHASE" == "Healthy" ]]; then
              echo "[INFO] Rollout is Healthy with new image — no promotion needed"
              exit 0
            fi
            if [[ "$PHASE" == "Degraded" || "$PHASE" == "Error" ]]; then
              echo "[FAIL] Rollout reached $PHASE — aborting"
              sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color || true
              exit 1
            fi
            sleep 15
          done

          PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
            | grep -E "^Status" | awk '{print $NF}' || true)
          if [[ "$PHASE" != "Paused" ]]; then
            echo "[FAIL] Rollout did not reach Paused within timeout (current: ${PHASE:-unknown})"
            exit 1
          fi

          sudo kubectl argo rollouts promote "$ROLLOUT" -n "$NAMESPACE"
          echo "[PASS] $ROLLOUT promoted — green ReplicaSet is now active"

          echo "[INFO] Waiting for Healthy state post-promotion..."
          for i in $(seq 1 12); do
            PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
              | grep -E "^Status" | awk '{print $NF}' || true)
            echo "  [$i/12] Phase: ${PHASE:-unknown}"
            if [[ "$PHASE" == "Healthy" ]]; then
              echo "[PASS] Rollout is Healthy — blue/green cycle complete"
              exit 0
            fi
            sleep 10
          done
          echo "[WARN] Rollout may still be converging, but promotion was issued"
          REMOTE_SCRIPT
          )

          # Substitute the placeholder with the real image tag before sending.
          # IMAGE_TAG contains only [a-z0-9-] chars so no escaping is needed.
          SCRIPT="${SCRIPT//__IMAGE_TAG__/$IMAGE_TAG}"

          # jq -Rs encodes the multi-line script as a valid JSON string so the
          # AWS CLI parameter parser does not choke on literal newlines.
          PARAMS_FILE=$(mktemp)
          printf '{"commands":[%s]}' "$(printf '%s' "$SCRIPT" | jq -Rs .)" > "$PARAMS_FILE"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://$PARAMS_FILE" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)
          rm -f "$PARAMS_FILE"

          echo "SSM Command ID: $CMD_ID"

          # Poll until the command finishes (max ~6 min to match the 24×15s inner loop)
          for i in $(seq 1 37); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] SSM status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              break
            fi
          done

          # Capture output regardless of result
          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          STDERR=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardErrorContent" --output text 2>/dev/null || echo "")

          echo "--- Remote stdout ---"
          echo "$OUTPUT"
          if [ -n "$STDERR" ]; then
            echo "--- Remote stderr ---"
            echo "$STDERR"
          fi

          if [[ "$STATUS" != "Success" ]]; then
            echo "::error::SSM command finished with status: $STATUS"
            exit 1
          fi

      - name: Promote Summary
        run: |
          echo "## [Site] Rollout Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- **Rollout**: \`nextjs\` (namespace: \`nextjs-app\`) ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Promotion executed via SSM on control-plane node. Green RS is now active." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # ── START-ADMIN (TanStack Start) ─────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Job: Build start-admin Docker image
  # Uses apps/start-admin/Dockerfile, serves on port 5001 under /admin/
  # server.js in frontend-portfolio includes a static file handler (tryServeStatic)
  # that maps /admin/assets/* → dist/client/assets/* before delegating to SSR.
  # This is required because TanStack Start's SSR handler does not serve
  # dist/client/ assets natively.
  # ---------------------------------------------------------------------------
  build-admin:
    name: "[Admin] Build Docker Image"
    needs: [resolve-targets]
    if: needs.resolve-targets.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    steps:
      - name: Checkout Frontend Repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Nelson-Lamounier/frontend-portfolio
          ref: ${{ needs.resolve-targets.outputs.frontend-ref }}
          token: ${{ secrets.CROSS_REPO_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (start-admin)
        uses: docker/build-push-action@v6
        with:
          context: .
          # start-admin uses its own dedicated Dockerfile (TanStack Start / Vite runtime)
          file: apps/start-admin/Dockerfile
          push: false
          load: false
          tags: start-admin:${{ env.IMAGE_TAG }}
          # Cache busted (v3): previous cache (v2) had mismatched server/client
          # bundle layers again (server referenced CSS hash C-jmx5-f, client
          # had CUbdlrCg). Root cause: dist/ was not in .dockerignore, so stale
          # local dist artifacts were copied into the build context and the GHA
          # layer cache reused a partial Vite output.
          # Fix: dist/ added to .dockerignore; scope bumped to v3 for clean slate.
          cache-from: type=gha,scope=start-admin-v3
          cache-to: type=gha,mode=max,scope=start-admin-v3
          provenance: false
          outputs: type=docker,dest=/tmp/admin-image.tar
          # ---------------------------------------------------------------------------
          # Build-time args — ONLY values that must be baked into the Vite bundle.
          #
          # Rules:
          #   INCLUDE  — anything referenced via `import.meta.env.VITE_*` in client code.
          #              Vite statically replaces these during bundling; they CANNOT be
          #              changed at container runtime.
          #
          #   EXCLUDE  — runtime config injected by deploy.py (ADMIN_API_URL, Cognito
          #              vars, etc.). These are in the K8s Secret/ConfigMap and arrive
          #              via envFrom at pod startup — never baked into the image.
          #
          # Adding a new client-side variable:
          #   1. Add VITE_MY_VAR to `build-args` below.
          #   2. Add it as a GitHub Actions variable (`vars.VITE_MY_VAR`) in the
          #      'development' environment settings.
          #   3. Reference it in code as `import.meta.env.VITE_MY_VAR`.
          # ---------------------------------------------------------------------------
          build-args: |
            NODE_ENV=production
            VITE_ADMIN_BASE_PATH=/admin

      - name: Cache Admin Image
        uses: actions/cache/save@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-image.tar
          key: admin-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Build Summary
        run: |
          IMAGE_SIZE=$(du -sh /tmp/admin-image.tar | cut -f1)
          echo "## [Admin] Docker Build" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Size**: $IMAGE_SIZE" >> $GITHUB_STEP_SUMMARY
          echo "- **Dockerfile**: apps/start-admin/Dockerfile" >> $GITHUB_STEP_SUMMARY
          echo "- **Source**: frontend-portfolio@${{ needs.resolve-targets.outputs.frontend-ref }}" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Push start-admin image to ECR
  # Uses a dedicated ECR repository for admin — separate from site
  # ---------------------------------------------------------------------------
  push-admin:
    name: "[Admin] Push to ECR"
    needs: [resolve-targets, build-admin]
    if: needs.resolve-targets.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ vars.ENVIRONMENT || 'development' }}

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Restore Admin Image from Cache
        uses: actions/cache/restore@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: /tmp/admin-image.tar
          key: admin-image-${{ env.ENVIRONMENT }}-${{ github.run_id }}-${{ github.run_attempt }}
          fail-on-cache-miss: true

      - name: Load Docker Image
        run: |
          docker load -i /tmp/admin-image.tar
          echo "[PASS] Admin image loaded"

      - name: Resolve ECR URL (start-admin)
        id: resolve-ecr
        run: |
          # start-admin has its own ECR repository under /shared/ecr-admin/{env}/
          # (CDK vpc-stack.ts: adminEcrSsmPrefix = /shared/ecr-admin/{env})
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$ECR_URL" ] || [ "$ECR_URL" = "None" ]; then
            echo "::error::Admin ECR URL not found at /shared/ecr-admin/${{ env.ENVIRONMENT }}/repository-uri"
            exit 1
          fi

          echo "::add-mask::$ECR_URL"
          echo "ecr-url=$ECR_URL" >> $GITHUB_OUTPUT

      - name: Push Admin Image to ECR
        run: |
          # Tag local image with ECR URI, authenticate, and push
          ECR_URL="${{ steps.resolve-ecr.outputs.ecr-url }}"
          TAG="${{ env.IMAGE_TAG }}"

          aws ecr get-login-password --region "${{ env.AWS_REGION }}" \
            | docker login --username AWS --password-stdin "$ECR_URL"

          docker tag "start-admin:${TAG}" "${ECR_URL}:${TAG}"
          docker push "${ECR_URL}:${TAG}"

          echo "[PASS] Admin image pushed: ${ECR_URL}:${TAG}"

      - name: Push Summary
        run: |
          echo "## [Admin] ECR Push" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }} ✅" >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Update SSM so ArgoCD picks up the new start-admin image
  # ---------------------------------------------------------------------------
  deploy-admin:
    name: "[Admin] Update SSM → ArgoCD"
    needs: [resolve-targets, push-admin]
    if: needs.resolve-targets.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Image URI
        id: resolve
        run: |
          ECR_URL=$(aws ssm get-parameter \
            --name "/shared/ecr-admin/${{ env.ENVIRONMENT }}/repository-uri" \
            --query 'Parameter.Value' \
            --output text)

          IMAGE_URI="${ECR_URL}:${{ env.IMAGE_TAG }}"
          echo "::add-mask::$ECR_URL"
          echo "::add-mask::$IMAGE_URI"
          echo "image-uri=$IMAGE_URI" >> $GITHUB_OUTPUT

      - name: Write Image URI to SSM
        run: |
          # SSM parameter consumed by ArgoCD Image Updater for start-admin Helm chart
          aws ssm put-parameter \
            --name "/start-admin/${{ env.ENVIRONMENT }}/image-uri" \
            --value "${{ steps.resolve.outputs.image-uri }}" \
            --type String \
            --overwrite

          echo "[PASS] Admin image URI written to SSM — ArgoCD will promote"

      - name: Deploy Summary
        run: |
          echo "## [Admin] Kubernetes Deployment" >> $GITHUB_STEP_SUMMARY
          echo "- **SSM Parameter**: \`/start-admin/${{ env.ENVIRONMENT }}/image-uri\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "ArgoCD Image Updater will detect the new tag and redeploy start-admin." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Wait for green ReplicaSet then promote the start-admin Rollout
  # ---------------------------------------------------------------------------
  promote-admin:
    name: "[Admin] Promote Rollout"
    needs: [resolve-targets, deploy-admin]
    if: needs.resolve-targets.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve Control-Plane Instance ID
        id: resolve-instance
        run: |
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters \
              "Name=tag:k8s:bootstrap-role,Values=control-plane" \
              "Name=instance-state-name,Values=running" \
            --query "Reservations[0].Instances[0].InstanceId" \
            --region "${{ env.AWS_REGION }}" --output text 2>/dev/null || echo "")

          if [ -z "$INSTANCE_ID" ] || [ "$INSTANCE_ID" = "None" ]; then
            echo "::error::Could not resolve control-plane instance ID — ensure the EC2 instance has tag k8s:bootstrap-role=control-plane"
            exit 1
          fi

          echo "::add-mask::$INSTANCE_ID"
          echo "instance-id=$INSTANCE_ID" >> $GITHUB_OUTPUT

      - name: Wait for Rollout Paused + Promote (via SSM)
        env:
          INSTANCE_ID: ${{ steps.resolve-instance.outputs.instance-id }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          REGION="${{ env.AWS_REGION }}"

          SCRIPT=$(cat <<'REMOTE_SCRIPT'
          set -euo pipefail

          ROLLOUT="start-admin"
          NAMESPACE="start-admin"
          PLUGIN="/usr/local/bin/kubectl-argo-rollouts"
          EXPECTED_TAG="__IMAGE_TAG__"

          if ! sudo test -f "$PLUGIN"; then
            echo "[INFO] Installing kubectl-argo-rollouts plugin..."
            sudo curl -sSLo "$PLUGIN" \
              https://github.com/argoproj/argo-rollouts/releases/latest/download/kubectl-argo-rollouts-linux-amd64
            sudo chmod +x "$PLUGIN"
          fi

          # ─── Step 0: Wait for ArgoCD Image Updater to sync the new image ──────
          echo "[INFO] Waiting for ArgoCD to sync new image tag: $EXPECTED_TAG (up to 5 min)..."
          for i in $(seq 1 20); do
            SPEC_IMAGE=$(sudo kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
              -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
            if [[ "$SPEC_IMAGE" == *"$EXPECTED_TAG"* ]]; then
              echo "[PASS] ArgoCD synced new image: $SPEC_IMAGE"
              break
            fi
            echo "  [$i/20] Waiting for ArgoCD sync (spec: ${SPEC_IMAGE##*/:-none})..."
            if [[ "$i" -eq 20 ]]; then
              echo "[FAIL] ArgoCD did not sync new image within 5 min. Current spec: $SPEC_IMAGE"
              exit 1
            fi
            sleep 15
          done

          echo "[INFO] Waiting for $ROLLOUT Rollout to reach Paused state..."
          for i in $(seq 1 24); do
            # $NF (last field) captures the status word, e.g. "Paused", "Healthy", "Degraded".
            # $2 would capture the icon glyph (✔/◌/✖) and never match any string comparison.
            PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
              | grep -E "^Status" | awk '{print $NF}' || true)
            echo "  [$i/24] Phase: ${PHASE:-unknown}"
            if [[ "$PHASE" == "Paused" ]]; then
              echo "[PASS] Rollout is Paused — promoting now"
              break
            fi
            # Healthy here means new image already promoted (e.g. manual re-run)
            if [[ "$PHASE" == "Healthy" ]]; then
              echo "[INFO] Rollout is Healthy with new image — no promotion needed"
              exit 0
            fi
            if [[ "$PHASE" == "Degraded" || "$PHASE" == "Error" ]]; then
              echo "[FAIL] Rollout reached $PHASE — aborting"
              sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color || true
              exit 1
            fi
            sleep 15
          done

          PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
            | grep -E "^Status" | awk '{print $NF}' || true)
          if [[ "$PHASE" != "Paused" ]]; then
            echo "[FAIL] Rollout did not reach Paused within timeout (current: ${PHASE:-unknown})"
            exit 1
          fi

          sudo kubectl argo rollouts promote "$ROLLOUT" -n "$NAMESPACE"
          echo "[PASS] $ROLLOUT promoted — green ReplicaSet is now active"

          echo "[INFO] Waiting for Healthy state post-promotion..."
          for i in $(seq 1 12); do
            PHASE=$(sudo kubectl argo rollouts get rollout "$ROLLOUT" -n "$NAMESPACE" --no-color 2>/dev/null \
              | grep -E "^Status" | awk '{print $NF}' || true)
            echo "  [$i/12] Phase: ${PHASE:-unknown}"
            if [[ "$PHASE" == "Healthy" ]]; then
              echo "[PASS] Rollout is Healthy — blue/green cycle complete"
              exit 0
            fi
            sleep 10
          done
          echo "[WARN] Rollout may still be converging, but promotion was issued"
          REMOTE_SCRIPT
          )

          # Substitute the placeholder with the real image tag before sending.
          SCRIPT="${SCRIPT//__IMAGE_TAG__/$IMAGE_TAG}"

          # jq -Rs encodes the multi-line script as a valid JSON string so the
          # AWS CLI parameter parser does not choke on literal newlines.
          PARAMS_FILE=$(mktemp)
          printf '{"commands":[%s]}' "$(printf '%s' "$SCRIPT" | jq -Rs .)" > "$PARAMS_FILE"

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --parameters "file://$PARAMS_FILE" \
            --region "$REGION" \
            --query "Command.CommandId" --output text)
          rm -f "$PARAMS_FILE"

          echo "SSM Command ID: $CMD_ID"

          for i in $(seq 1 37); do
            sleep 10
            STATUS=$(aws ssm get-command-invocation \
              --command-id "$CMD_ID" \
              --instance-id "$INSTANCE_ID" \
              --region "$REGION" \
              --query "Status" --output text 2>/dev/null || echo "Pending")
            echo "  [$i] SSM status: $STATUS"
            if [[ "$STATUS" == "Success" || "$STATUS" == "Failed" || "$STATUS" == "TimedOut" || "$STATUS" == "Cancelled" ]]; then
              break
            fi
          done

          OUTPUT=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardOutputContent" --output text 2>/dev/null || echo "(no output)")
          STDERR=$(aws ssm get-command-invocation \
            --command-id "$CMD_ID" \
            --instance-id "$INSTANCE_ID" \
            --region "$REGION" \
            --query "StandardErrorContent" --output text 2>/dev/null || echo "")

          echo "--- Remote stdout ---"
          echo "$OUTPUT"
          if [ -n "$STDERR" ]; then
            echo "--- Remote stderr ---"
            echo "$STDERR"
          fi

          if [[ "$STATUS" != "Success" ]]; then
            echo "::error::SSM command finished with status: $STATUS"
            exit 1
          fi

      - name: Promote Summary
        run: |
          echo "## [Admin] Rollout Promotion" >> $GITHUB_STEP_SUMMARY
          echo "- **Rollout**: \`start-admin\` (namespace: \`start-admin\`) ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Tag**: ${{ env.IMAGE_TAG }}" >> $GITHUB_STEP_SUMMARY
          echo "- Promotion executed via SSM on control-plane node. Green RS is now active." >> $GITHUB_STEP_SUMMARY

  # ---------------------------------------------------------------------------
  # Job: Smoke-test the live site after rollout promotion + asset sync.
  # Verifies the blue/green cycle completed: new image active on stable RS,
  # all new pods Running, old RS scaled down. Runs on k8s-runner (in-cluster)
  # so kubectl can reach the API server directly without SSM hop.
  # ---------------------------------------------------------------------------
  smoke-site:
    name: "[Site] Smoke Test"
    needs: [resolve-targets, promote-site, sync-assets]
    if: needs.resolve-targets.outputs.deploy-site == 'true'
    runs-on: k8s-runner
    timeout-minutes: 15
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Set up in-cluster kubeconfig
        run: |
          aws ssm get-parameter \
            --name "/k8s/${{ env.ENVIRONMENT }}/kubeconfig" \
            --with-decryption \
            --region "${{ env.AWS_REGION }}" \
            --query 'Parameter.Value' \
            --output text \
            | sed 's|https://127.0.0.1:6443|https://kubernetes.default.svc:443|g' \
            > /tmp/kubeconfig
          chmod 600 /tmp/kubeconfig

      - name: Verify Blue/Green Rollout — Image + Pod Readiness
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          ROLLOUT="nextjs"
          NAMESPACE="nextjs-app"
          IMAGE_TAG="${{ env.IMAGE_TAG }}"

          echo "=== Rollout: $ROLLOUT | Namespace: $NAMESPACE | Tag: $IMAGE_TAG ==="

          # 1. Phase check — must be Healthy (promotion completed, old RS scaled down)
          PHASE=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "unknown")
          echo "[1/4] Rollout phase: $PHASE"
          if [[ "$PHASE" != "Healthy" ]]; then
            echo "::error::Rollout phase is '$PHASE' — expected Healthy. Blue/green cycle incomplete."
            kubectl describe rollout "$ROLLOUT" -n "$NAMESPACE" 2>/dev/null || true
            exit 1
          fi

          # 2. Image check — rollout spec must reference the new IMAGE_TAG
          CURRENT_IMAGE=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
            -o jsonpath='{.spec.template.spec.containers[0].image}' 2>/dev/null || echo "")
          echo "[2/4] Active image: $CURRENT_IMAGE"
          if [[ "$CURRENT_IMAGE" != *"$IMAGE_TAG"* ]]; then
            echo "::error::Rollout image ($CURRENT_IMAGE) does not match expected tag ($IMAGE_TAG)"
            echo "  ArgoCD may not have synced yet or IMAGE_TAG mismatch."
            exit 1
          fi
          echo "[PASS] Image tag confirmed in rollout spec"

          # 3. Stable RS pods — wait up to 60s for all pods Running
          STABLE_HASH=$(kubectl get rollout "$ROLLOUT" -n "$NAMESPACE" \
            -o jsonpath='{.status.stableRS}' 2>/dev/null || echo "")
          echo "[3/4] Stable RS hash: ${STABLE_HASH:-unknown}"
          if [[ -z "$STABLE_HASH" ]]; then
            echo "::error::Could not determine stable ReplicaSet hash for rollout $ROLLOUT"
            exit 1
          fi

          for i in $(seq 1 12); do
            TOTAL=$(kubectl get pods -n "$NAMESPACE" \
              -l "rollouts-pod-template-hash=$STABLE_HASH" \
              --no-headers 2>/dev/null | wc -l | tr -d ' ')
            RUNNING=$(kubectl get pods -n "$NAMESPACE" \
              -l "rollouts-pod-template-hash=$STABLE_HASH" \
              --field-selector=status.phase=Running \
              --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "  [$i/12] New pods: $RUNNING/$TOTAL Running (stable RS)"
            if [[ "$TOTAL" -gt 0 && "$RUNNING" -eq "$TOTAL" ]]; then
              echo "[PASS] All $TOTAL new pod(s) Running"
              break
            fi
            if [[ "$i" -eq 12 ]]; then
              echo "::error::New pods not fully Running after 60s ($RUNNING/$TOTAL)"
              kubectl get pods -n "$NAMESPACE" -l "rollouts-pod-template-hash=$STABLE_HASH" || true
              exit 1
            fi
            sleep 5
          done

          # 4. Old RS check — pods NOT on the stable hash should be Terminating or gone
          echo "[4/4] Checking old pods are draining..."
          ALL_PODS=$(kubectl get pods -n "$NAMESPACE" -l "app=$ROLLOUT" \
            --no-headers 2>/dev/null | wc -l | tr -d ' ')
          NEW_PODS=$(kubectl get pods -n "$NAMESPACE" \
            -l "rollouts-pod-template-hash=$STABLE_HASH" \
            --no-headers 2>/dev/null | wc -l | tr -d ' ')
          OLD_PODS=$(( ALL_PODS - NEW_PODS ))
          echo "  Total pods: $ALL_PODS | New (stable): $NEW_PODS | Old (draining): $OLD_PODS"
          if [[ "$OLD_PODS" -gt 0 ]]; then
            echo "::warning::$OLD_PODS old pod(s) still present (scaleDownDelay may still be active — expected within 30s)"
            kubectl get pods -n "$NAMESPACE" -l "app=$ROLLOUT" || true
          else
            echo "[PASS] Old pods fully drained"
          fi

      - name: Smoke Summary
        if: always()
        env:
          KUBECONFIG: /tmp/kubeconfig
        run: |
          echo "## [Site] Smoke Test" >> $GITHUB_STEP_SUMMARY
          echo "- **Image Tag**: \`${{ env.IMAGE_TAG }}\`" >> $GITHUB_STEP_SUMMARY
          PHASE=$(kubectl get rollout nextjs -n nextjs-app \
            -o jsonpath='{.status.phase}' 2>/dev/null || echo "unknown")
          ICON=$( [[ "$PHASE" == "Healthy" ]] && echo "✅" || echo "❌" )
          echo "- **Rollout Phase**: $ICON $PHASE" >> $GITHUB_STEP_SUMMARY
          STABLE_HASH=$(kubectl get rollout nextjs -n nextjs-app \
            -o jsonpath='{.status.stableRS}' 2>/dev/null || echo "")
          if [[ -n "$STABLE_HASH" ]]; then
            TOTAL=$(kubectl get pods -n nextjs-app -l "rollouts-pod-template-hash=$STABLE_HASH" \
              --no-headers 2>/dev/null | wc -l | tr -d ' ')
            RUNNING=$(kubectl get pods -n nextjs-app -l "rollouts-pod-template-hash=$STABLE_HASH" \
              --field-selector=status.phase=Running \
              --no-headers 2>/dev/null | wc -l | tr -d ' ')
            echo "- **Active Pods (stable RS \`$STABLE_HASH\`)**: $RUNNING/$TOTAL Running" >> $GITHUB_STEP_SUMMARY
          fi

  # ---------------------------------------------------------------------------
  # Job: Invalidate CloudFront cache for /admin/* after promote-admin
  # Required because TanStack Start uses content-hashed assets — stale HTML
  # references old asset hashes after every deploy, causing CSS/JS 404s.
  # ---------------------------------------------------------------------------
  invalidate-admin:
    name: "[Admin] Invalidate CloudFront Cache"
    needs: [resolve-targets, promote-admin]
    if: needs.resolve-targets.outputs.deploy-admin == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: development

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve CloudFront Distribution ID
        id: resolve-dist
        run: |
          DIST_ID=$(aws ssm get-parameter \
            --name "/nextjs/${{ env.ENVIRONMENT }}/cloudfront/distribution-id" \
            --query 'Parameter.Value' \
            --output text)

          if [ -z "$DIST_ID" ] || [ "$DIST_ID" = "None" ]; then
            echo "::error::CloudFront distribution ID not found in SSM"
            exit 1
          fi

          echo "dist-id=$DIST_ID" >> $GITHUB_OUTPUT

      - name: Invalidate /admin/* paths
        run: |
          DIST_ID="${{ steps.resolve-dist.outputs.dist-id }}"

          INVALIDATION_ID=$(aws cloudfront create-invalidation \
            --distribution-id "$DIST_ID" \
            --paths "/admin/*" "/admin/assets/*" \
            --query "Invalidation.Id" \
            --output text)

          echo "[PASS] Invalidation created: $INVALIDATION_ID"
          echo "invalidation-id=$INVALIDATION_ID" >> $GITHUB_ENV

          # Wait for invalidation to complete (typically 30-60 seconds)
          echo "[INFO] Waiting for invalidation to complete..."
          aws cloudfront wait invalidation-completed \
            --distribution-id "$DIST_ID" \
            --id "$INVALIDATION_ID"

          echo "[PASS] CloudFront cache invalidated for /admin/* and /admin/assets/*"

      - name: Invalidation Summary
        run: |
          echo "## [Admin] CloudFront Invalidation" >> $GITHUB_STEP_SUMMARY
          echo "- **Paths**: \`/admin/*\`, \`/admin/assets/*\` ✅" >> $GITHUB_STEP_SUMMARY
          echo "- **Distribution**: \`${{ steps.resolve-dist.outputs.dist-id }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Cache cleared — browsers will fetch fresh HTML with new asset hashes." >> $GITHUB_STEP_SUMMARY

  # ===========================================================================
  # ── INDEPENDENT JOBS ─────────────────────────────────────────────────────────
  # ===========================================================================

  # ---------------------------------------------------------------------------
  # Job: Migrate articles — independent, runs in parallel with both deploy paths
  # ---------------------------------------------------------------------------
  migrate-articles:
    name: Migrate Articles
    needs: [resolve-targets]
    if: |
      !inputs.skip-migration &&
      (github.event_name != 'repository_dispatch' || github.event.client_payload.migrate == true)
    uses: ./.github/workflows/_migrate-articles.yml
    with:
      environment: development
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}
      CROSS_REPO_PAT: ${{ secrets.CROSS_REPO_PAT }}

  # ===========================================================================
  # Summary — waits for all parallel paths
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs:
      - resolve-targets
      - build-site
      - push-site
      - sync-assets
      - deploy-site
      - promote-site
      - smoke-site
      - build-admin
      - push-admin
      - deploy-admin
      - promote-admin
      - invalidate-admin
    if: always()
    runs-on: ubuntu-latest

    steps:
      - name: Generate Summary
        run: |
          echo "## Frontend Monorepo Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Stage | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-----|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Site rows (only shown if deploy-site was requested)
          if [[ "${{ needs.resolve-targets.outputs.deploy-site }}" == "true" ]]; then
            echo "| Site (Next.js)  | Build Image       | ${{ needs.build-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)  | Push to ECR       | ${{ needs.push-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)  | Sync Assets       | ${{ needs.sync-assets.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)  | Deploy to K8s     | ${{ needs.deploy-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)  | Promote Rollout   | ${{ needs.promote-site.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Site (Next.js)  | Smoke Test        | ${{ needs.smoke-site.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          # Admin rows (only shown if deploy-admin was requested)
          if [[ "${{ needs.resolve-targets.outputs.deploy-admin }}" == "true" ]]; then
            echo "| Admin (TanStack) | Build Image      | ${{ needs.build-admin.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Admin (TanStack) | Push to ECR      | ${{ needs.push-admin.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Admin (TanStack) | Deploy to K8s    | ${{ needs.deploy-admin.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Admin (TanStack) | Promote Rollout  | ${{ needs.promote-admin.result }} |" >> $GITHUB_STEP_SUMMARY
            echo "| Admin (TanStack) | Invalidate CF    | ${{ needs.invalidate-admin.result }} |" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY

          # Determine overall result — only fail on actual failures (skip skipped/cancelled)
          FAILED=false
          for RESULT in \
            "${{ needs.build-site.result }}" \
            "${{ needs.push-site.result }}" \
            "${{ needs.deploy-site.result }}" \
            "${{ needs.promote-site.result }}" \
            "${{ needs.smoke-site.result }}" \
            "${{ needs.build-admin.result }}" \
            "${{ needs.push-admin.result }}" \
            "${{ needs.deploy-admin.result }}" \
            "${{ needs.promote-admin.result }}" \
            "${{ needs.invalidate-admin.result }}"; do
            if [[ "$RESULT" == "failure" ]]; then
              FAILED=true
              break
            fi
          done

          if [[ "$FAILED" == "true" ]]; then
            echo "**Result: FAILED** — check individual job logs above" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi

          echo "**Result: SUCCESS**" >> $GITHUB_STEP_SUMMARY
