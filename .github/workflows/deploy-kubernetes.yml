# @format
# @description Deploy K8s Infrastructure to Development
#
# Unified infrastructure pipeline for the K8s cluster.
# Deploys CDK stacks, syncs bootstrap scripts, builds Golden AMI,
# and runs verification — all in one pipeline.
#
# 9-Stack Architecture: Data → Base → Compute → AppIam → Api → Edge → PlatformRds.
# Control Plane stack includes AMI-refresh automation (EventBridge + Step Functions).
# Application workloads (traefik, metrics-server) are managed by
# ArgoCD via Pipeline B (gitops-k8s.yml).
#
# Prerequisites:
#   - Shared VPC from deploy-shared workflow

name: Deploy K8s to Development

on:
  # push:
  #   branches:
  #     - develop
  #   paths:
  #     - "infra/lib/stacks/kubernetes/**"
  #     - "infra/lib/config/kubernetes/**"
  #     - "infra/lib/config/nextjs/**"
  #     - "infra/lib/projects/kubernetes/**"
  #     - "infra/scripts/cd/**"
  #     - "infra/bin/app.ts"
  #     - ".github/workflows/deploy-kubernetes*.yml"
  #     - ".github/workflows/_deploy-kubernetes.yml"
  #     - ".github/workflows/_deploy-stack.yml"
  #     - ".github/actions/**"
  # Weekly: AMI refresh for OS security patches
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:
    inputs:
      skip_verification:
        description: "Skip post-deployment verification"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-k8s-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Development
    uses: ./.github/workflows/_deploy-kubernetes.yml
    with:
      environment: development
      cdk-environment: development
      require-approval: never
      skip-verification: ${{ inputs.skip_verification || false }}
    secrets: inherit

  deploy-marker:
    name: Loki deploy marker
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
        with:
          service:     cdk-k8s
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "k8s CDK stack"
