# @format
# @deprecated: Replaced by deploy-eks-development.yml on 2026-05-07.
# @reason: kubeadm cluster decommissioned; EKS is now the sole cluster.
# @see: docs/superpowers/specs/2026-05-05-eks-migration-design.md
# Kept for: cdk destroy reference (run manually to tear down kubeadm stacks).
# Active stacks: Data, Base, Api. PlatformRds moved to deploy-eks-development.yml.
# Do not trigger automatically.

name: Deploy K8s to Development

on:
  workflow_dispatch:
    inputs:
      skip_verification:
        description: "Skip post-deployment verification"
        type: boolean
        default: false

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-k8s-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Development
    uses: ./.github/workflows/_deploy-kubernetes.yml
    with:
      environment: development
      cdk-environment: development
      require-approval: never
      skip-verification: ${{ inputs.skip_verification || false }}
    secrets: inherit

  deploy-marker:
    name: Loki deploy marker
    needs: [deploy]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     cdk-k8s
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "k8s CDK stack"
