# @format
# @description Deploy Organisation Resources to the Root/Management Account
#
# Deploys cross-account infrastructure that lives in the AWS root account:
#   1. DNS Role — IAM role allowing the dev account to create Route 53 records
#      in the root-account hosted zone for ACM certificate validation.
#
# Security:
#   - Manual trigger only (workflow_dispatch).
#   - **Required-reviewer gate** on the `management` GitHub Environment is the
#     primary protection — the deploy job pauses until an approved reviewer
#     clicks "Approve and run" in the GitHub UI. This is enforced by GitHub
#     and cannot be bypassed in code.
#   - All sensitive values (account IDs, hosted zone, role ARN) are sourced
#     from GitHub environment variables/secrets and masked in logs.
#   - OIDC federation — no long-lived credentials stored anywhere.
#
# Prerequisites:
#   - The 'management' GitHub Environment must exist with:
#       Required reviewers: at least one (Settings → Environments → management
#                           → Required reviewers)
#       Variables: ROOT_ACCOUNT_ID, DEV_ACCOUNT_ID, AWS_REGION, HOSTED_ZONE_ID
#       Secrets:   AWS_OIDC_ROLE
#   - CDK bootstrap must already be present in the root account/region.
#
# Usage:
#   gh workflow run deploy-org.yml --ref develop -f stack=dns-role
#   # then approve the run in the GitHub Actions UI when prompted

name: Deploy Organization (Root Account)

on:
  workflow_dispatch:
    inputs:
      stack:
        description: "Stack to deploy"
        required: true
        default: "dns-role"
        type: choice
        options:
          - dns-role
          - all

# Minimum required permissions for OIDC token exchange and repo checkout.
permissions:
  id-token: write   # Required by aws-actions/configure-aws-credentials (OIDC)
  contents: read     # Required by actions/checkout

jobs:
  # ===========================================================================
  # Stack 1: Cross-Account DNS Validation Role
  #
  # Creates an IAM role in the root account that the dev account can assume
  # to create/delete Route 53 records for ACM certificate DNS validation.
  #
  # Context values passed to CDK:
  #   hostedZoneIds  — The Route 53 hosted zone ID(s) the role can modify.
  #
  # Delegates to the reusable _deploy-stack.yml workflow for:
  #   - AWS credential configuration (OIDC)
  #   - CDK preflight checks and deployment
  #   - Output capture and summary generation
  # ===========================================================================
  # ────────────────────────────────────────────────────────────────────────
  # Build the hostedZoneIds list as a job-level step so the comma-separated
  # value can include optional tucaken zones without inlining a complex
  # ternary into the reusable workflow `with:` block.
  # ────────────────────────────────────────────────────────────────────────
  resolve-hosted-zones:
    name: Resolve Hosted Zone IDs
    if: inputs.stack == 'dns-role' || inputs.stack == 'all'
    runs-on: ubuntu-latest
    # Bound to 'management' to access the root-account OIDC role for SSM queries.
    # Zone IDs (Z0985246...) cannot accidentally match OIDC role ARNs or passwords
    # so step-output masking is not a risk here (unlike reading from vars.*
    # alongside environment secrets whose values might overlap).
    environment: management
    outputs:
      hosted-zone-ids: ${{ steps.build.outputs.zones }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Query Hosted Zone IDs from SSM
        id: build
        shell: bash
        env:
          SSM_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}
        run: |
          set -euo pipefail

          # ── Helper: query SSM, return empty string on missing parameter ──
          get_zone() {
            aws ssm get-parameter \
              --name "$1" \
              --region "${SSM_REGION}" \
              --query 'Parameter.Value' \
              --output text 2>/dev/null || echo ""
          }

          PORTFOLIO_ZONE=$(get_zone "/org/route53/portfolio-zone-id")
          TUCAKEN_IO_ZONE=$(get_zone "/org/route53/tucaken-io-zone-id")
          TUCAKEN_COM_ZONE=$(get_zone "/org/route53/tucaken-com-zone-id")

          # ── Presence-only diagnostic (does not leak values) ──
          echo "── Hosted zone SSM lookup (presence only) ───────────"
          echo "  /org/route53/portfolio-zone-id    : $([[ -n "${PORTFOLIO_ZONE}"   ]] && echo found || echo MISSING)"
          echo "  /org/route53/tucaken-io-zone-id   : $([[ -n "${TUCAKEN_IO_ZONE}"  ]] && echo found || echo MISSING)"
          echo "  /org/route53/tucaken-com-zone-id  : $([[ -n "${TUCAKEN_COM_ZONE}" ]] && echo found || echo MISSING)"
          echo ""

          # Build comma-separated list, skipping any missing parameters.
          ZONES=""
          [[ -n "${PORTFOLIO_ZONE}"   ]] && ZONES="${PORTFOLIO_ZONE}"
          [[ -n "${TUCAKEN_IO_ZONE}"  ]] && ZONES="${ZONES:+${ZONES},}${TUCAKEN_IO_ZONE}"
          [[ -n "${TUCAKEN_COM_ZONE}" ]] && ZONES="${ZONES:+${ZONES},}${TUCAKEN_COM_ZONE}"

          if [[ -z "${ZONES}" ]]; then
            echo "::error::Resolved zero hosted zones from SSM."
            echo "::error::Create the parameters in the root account before running this workflow:"
            echo "::error::  aws ssm put-parameter --name /org/route53/portfolio-zone-id --value <ID> --type String"
            echo "::error::  aws ssm put-parameter --name /org/route53/tucaken-io-zone-id --value <ID> --type String"
            echo "::error::  aws ssm put-parameter --name /org/route53/tucaken-com-zone-id --value <ID> --type String"
            exit 1
          fi

          IFS=',' read -ra Z_ARR <<< "${ZONES}"
          echo "zones=${ZONES}" >> "$GITHUB_OUTPUT"
          echo "[OK] Resolved ${#Z_ARR[@]} hosted zone(s) for DNS role policy"

  deploy-dns-role:
    name: Deploy DNS Role
    needs: [resolve-hosted-zones]
    if: inputs.stack == 'dns-role' || inputs.stack == 'all'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Org-DnsRole-management
      project: org
      environment: management                          # CDK environment (mapped to root account)
      aws-account-id: ${{ vars.ROOT_ACCOUNT_ID }}      # Target account for deployment
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      root-account-id: ${{ vars.ROOT_ACCOUNT_ID }}     # Passed as ROOT_ACCOUNT env var to CDK
      additional-args: >-
        --context hostedZoneIds=${{ needs.resolve-hosted-zones.outputs.hosted-zone-ids }}
      outputs-directory: org-outputs
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}      # OIDC role ARN for root account access

  # ===========================================================================
  # Summary — Always runs, even on failure/skip, to provide a deployment report
  # in the GitHub Actions step summary (visible on the workflow run page).
  # ===========================================================================
  summary:
    name: Deployment Summary
    needs: [resolve-hosted-zones, deploy-dns-role]
    runs-on: ubuntu-latest
    if: always()

    steps:
      # Write a markdown summary table to the GitHub Actions step summary.
      # This appears as a rich report on the workflow run page.
      - name: Generate Summary
        run: |
          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M:%S UTC')

          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Organization (Root Account) Deployment

          **Target**: AWS Root/Management Account
          **Timestamp**: ${TIMESTAMP}
          **Stack Requested**: ${{ inputs.stack }}

          ### Deployment Status

          | Stage | Status |
          |-------|--------|
          | Resolve Hosted Zones | ${{ needs.resolve-hosted-zones.result }} |
          | DNS Role | ${{ needs.deploy-dns-role.result }} |

          EOF

          if [ "${{ needs.deploy-dns-role.result }}" == "success" ]; then
            cat >> $GITHUB_STEP_SUMMARY << EOF

          ### Next Steps

          The cross-account DNS validation role is now deployed.
          Target account (portfolio) can now assume this role for ACM certificate validation.

          EOF
          fi

      # Fail the workflow if the DNS role deployment did not succeed.
      # This ensures the overall workflow status reflects the deployment outcome.
      - name: Check Final Status
        run: |
          if [ "${{ needs.deploy-dns-role.result }}" != "success" ]; then
            echo "[FAIL] Deployment failed or was skipped"
            exit 1
          fi

          echo "[OK] Org deployment completed successfully"

  deploy-marker:
    name: Loki deploy marker
    needs: [resolve-hosted-zones, deploy-dns-role, summary]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v7
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     cdk-org
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "Org-level CDK (DNS role + zones)"
