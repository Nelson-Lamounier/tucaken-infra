# @format
# @description Deploy Post-Bootstrap Config (Standalone)
#
# ─── Purpose ───────────────────────────────────────────────────────
# Standalone pipeline to re-inject Kubernetes application secrets and
# verify ArgoCD health WITHOUT re-triggering SM-A (Bootstrap Orchestrator).
#
# This calls SM-B (Config Orchestrator) via _post-bootstrap-config.yml
# which runs the five deploy.py scripts sequentially on the control plane:
#   1. nextjs/deploy.py      — K8s Secret + IngressRoute originSecret patch
#   2. monitoring/deploy.py  — K8s Secrets + Helm chart + Grafana reset
#   3. start-admin/deploy.py — Cognito / DynamoDB / Bedrock Secret
#   4. admin-api/deploy.py   — ConfigMap + Secret + IngressRoute
#   5. public-api/deploy.py  — ConfigMap + Secret + IngressRoute
#
# ─── Use This When ─────────────────────────────────────────────────
#   - Rotating secrets (new SSM parameter values → re-inject via SM-B)
#   - Helm chart config changes (values.yaml updates in workloads/charts/)
#   - Verifying ArgoCD health after manual cluster changes
#   - Testing SM-B independently after infrastructure changes
#
# ─── Local Equivalent ──────────────────────────────────────────────
#   just config-run development
#   just config-status          # check execution status
#
# ─── No Bootstrap ──────────────────────────────────────────────────
# SM-A bootstrap is NOT triggered. Use _deploy-ssm-automation.yml
# (via deploy-ssm-automation.yml) when cluster re-bootstrap is needed.

name: Deploy Post-Bootstrap Config

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        type: choice
        options:
          - development
        default: development

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-post-bootstrap-${{ inputs.environment }}
  cancel-in-progress: false

env:
  NODE_VERSION: "22"
  AWS_REGION: ${{ vars.AWS_REGION || 'eu-west-1' }}

jobs:
  # ===========================================================================
  # Sync deploy.py scripts to S3 before triggering SM-B.
  #
  # SM-B downloads scripts from S3 before executing them on EC2. Without this
  # step, SM-B runs whatever was last synced — stale code from a previous
  # pipeline run. This ensures the latest committed scripts are always used.
  #
  # Syncs three targets (same as Phase 2 in _deploy-ssm-automation.yml):
  #   1. k8s-bootstrap/                → s3://{bucket}/k8s-bootstrap/
  #   2. workloads/charts/nextjs/      → s3://{bucket}/app-deploy/nextjs/
  #   3. platform/charts/monitoring/   → s3://{bucket}/app-deploy/monitoring/
  #   4. workloads/charts/start-admin/ → s3://{bucket}/app-deploy/start-admin/
  #   5. workloads/charts/admin-api/   → s3://{bucket}/app-deploy/admin-api/
  #   6. workloads/charts/public-api/  → s3://{bucket}/app-deploy/public-api/
  #   7. workloads/charts/wiki-mcp/    → s3://{bucket}/app-deploy/wiki-mcp/
  # ===========================================================================
  sync-scripts:
    name: "Sync Scripts to S3"
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/nelson-lamounier/cdk-monitoring/ci:latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Environment and Dependencies
        uses: ./.github/actions/setup-node-yarn
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Build TypeScript
        run: just build

      - name: Configure AWS Credentials
        uses: ./.github/actions/configure-aws
        with:
          role-to-assume: ${{ secrets.AWS_OIDC_ROLE }}
          aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}

      - name: Sync Scripts to S3
        run: just ci-sync-scripts --environment ${{ inputs.environment }} --region ${{ env.AWS_REGION }}

  post-bootstrap:
    name: "SM-B Config Injection & Verify"
    needs: [sync-scripts]
    uses: ./.github/workflows/_post-bootstrap-config.yml
    with:
      environment: ${{ inputs.environment }}
      cdk-environment: ${{ inputs.environment }}
    secrets: inherit
