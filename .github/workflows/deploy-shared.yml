# @format
# Deploy Shared Infrastructure to Development.
#
# Deploys all shared stacks that other projects depend on:
#   1. VPC + ECR (foundation for all projects)
#   2. Security Baseline (GuardDuty, Security Hub, Access Analyzer, CloudTrail)
#   3. FinOps (AWS Budgets + SNS alerting)
#   4. Crossplane (IAM user + Secrets Manager for K8s infra abstraction)
#   5. Cognito Auth (Admin User Pool + Hosted UI)
#
# All five stacks are independent and deploy in parallel.
# Must be deployed BEFORE kubernetes/bedrock stacks.
#
# Trigger: push to main touching any shared-infra-relevant path, or workflow_dispatch.
# Branching model: feature/* → PR → develop → PR → main → this workflow.
#
# Path strategy — any change under these trees causes a deploy:
#   infra/lib/stacks/shared/**   — shared CDK stack definitions
#   infra/lib/projects/shared/** — shared project factory (instantiates stacks)
#   infra/lib/shared/**          — SharedVpcStack (VPC + ECR base construct)
#   infra/lib/constructs/**      — shared CDK constructs (iam, finops, security, observability)
#   infra/lib/factories/**       — shared project-registry / factory base
#   infra/lib/utilities/**       — shared utilities (naming etc.)
#   infra/lib/config/**          — environments, projects, ssm-paths (imported by all stacks)
#   infra/bin/app.ts             — CDK entry point (stack assembly root)
#   .github/workflows/deploy-shared.yml  — this file
#   .github/workflows/_deploy-stack.yml  — reusable stack deploy workflow
#   .github/actions/**           — shared composite actions used by all pipelines
#
# Note on CI gate: branch protection requires CI to pass before merging to main,
# so code on main has already been validated. No workflow_run[CI] gate needed.

name: Deploy Shared (Dev)

on:
  push:
    branches:
      - main
    paths:
      - "infra/lib/stacks/shared/**"
      - "infra/lib/projects/shared/**"
      - "infra/lib/shared/**"
      - "infra/lib/constructs/**"
      - "infra/lib/factories/**"
      - "infra/lib/utilities/**"
      - "infra/lib/config/**"
      - "infra/bin/app.ts"
      - ".github/workflows/deploy-shared.yml"
      - ".github/workflows/_deploy-stack.yml"
      - ".github/actions/**"

  workflow_dispatch:

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-shared-development
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Stack 1: VPC + ECR — Foundation for all projects
  # ===========================================================================
  deploy-infra:
    name: Deploy VPC + ECR
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-Infra-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 2: Security Baseline — GuardDuty + Security Hub + Access Analyzer
  # ===========================================================================
  deploy-security:
    name: Deploy Security Baseline
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-SecurityBaseline-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      notification-email: ${{ vars.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 3: FinOps — AWS Budgets + SNS Alerting
  # Cost: Free (first 2 budgets per account).
  # ===========================================================================
  deploy-finops:
    name: Deploy FinOps
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-FinOps-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      notification-email: ${{ vars.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 4: Crossplane — IAM User + Secrets Manager for K8s Infra Abstraction
  # Cost: $0.40/month (Secrets Manager secret storage).
  # ===========================================================================
  deploy-crossplane:
    name: Deploy Crossplane IAM
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-Crossplane-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 5: Cognito Auth — Admin Authentication (User Pool + Hosted UI)
  # Cost: Free (first 50,000 MAUs).
  # ===========================================================================
  deploy-cognito:
    name: Deploy Cognito Auth
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-CognitoAuth-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  deploy-marker:
    name: Loki deploy marker
    needs: [deploy-infra, deploy-security, deploy-finops, deploy-crossplane, deploy-cognito]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     cdk-shared
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "Shared infra (VPC + IAM + Cognito + Crossplane)"
