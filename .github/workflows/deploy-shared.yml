# @format
# @description Deploy Shared Infrastructure to Development
#
# Deploys all shared stacks that other projects depend on:
#   1. VPC + ECR (foundation for all projects)
#   2. Security Baseline (GuardDuty, Security Hub, Access Analyzer, CloudTrail, EventBridge)
#   3. FinOps (AWS Budgets + SNS alerting)
#   4. Crossplane (IAM user + Secrets Manager for K8s infra abstraction)
#
# All four stacks are independent and deploy in parallel.
# Must be deployed BEFORE kubernetes/bedrock stacks.
#
# Trigger chain:
#   push → main → CI ("Continuous Integration") completes
#                 ↓  workflow_run [completed, conclusion=success, branch=main]
#               Deploy Shared (this workflow)
#                 ↓  gate job — only proceeds if shared-infra paths changed
#               Deploy K8s (deploy-kubernetes.yml, triggered by this workflow's completion)

name: Deploy Shared (Dev)

on:
  workflow_dispatch: # Manual trigger — always deploys regardless of changed paths
  workflow_run:
    workflows: ["Continuous Integration"]
    types: [completed]
    branches: [main]

permissions:
  id-token: write
  contents: read

concurrency:
  group: deploy-shared-development
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # Gate — CI must have succeeded + relevant paths must have changed.
  # Skips all deploy jobs on pushes that didn't touch shared-infra files.
  # workflow_dispatch bypasses the paths check and always deploys.
  # ===========================================================================
  gate:
    name: Check CI result + changed paths
    runs-on: ubuntu-latest
    outputs:
      deploy: ${{ steps.decide.outputs.deploy }}
    steps:
      - name: Check upstream conclusion
        id: upstream
        run: |
          if [[ "${{ github.event_name }}" == "workflow_run" ]]; then
            CONCLUSION="${{ github.event.workflow_run.conclusion }}"
            echo "conclusion=$CONCLUSION" >> "$GITHUB_OUTPUT"
            if [[ "$CONCLUSION" != "success" ]]; then
              echo "ok=false" >> "$GITHUB_OUTPUT"
              echo "CI concluded: $CONCLUSION — will skip deploy."
            else
              echo "ok=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "ok=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        if: steps.upstream.outputs.ok == 'true'
        with:
          # Check out the commit that triggered CI, not the workflow file HEAD.
          ref: ${{ github.event.workflow_run.head_sha || github.sha }}
          fetch-depth: 2  # HEAD + HEAD~1 required for the diff below

      - name: Detect changed paths
        id: paths
        if: steps.upstream.outputs.ok == 'true' && github.event_name == 'workflow_run'
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD)
          echo "Changed files:"
          echo "$changed"
          if echo "$changed" | grep -qE \
            '^(infra/lib/shared/|infra/lib/stacks/shared/|infra/lib/common/(finops|security|iam|cognito)/|infra/bin/app\.ts$|scripts/deployment/stacks\.ts$|\.github/workflows/deploy-shared\.yml$|\.github/workflows/_deploy-stack\.yml$|\.github/actions/)'; then
            echo "relevant=true" >> "$GITHUB_OUTPUT"
          else
            echo "relevant=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Decide whether to deploy
        id: decide
        run: |
          if [[ "${{ steps.upstream.outputs.ok }}" != "true" ]]; then
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "Upstream did not succeed — skipping."
          elif [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Manual trigger — deploying."
          elif [[ "${{ steps.paths.outputs.relevant }}" == "true" ]]; then
            echo "deploy=true" >> "$GITHUB_OUTPUT"
            echo "Shared-infra paths changed — deploying."
          else
            echo "deploy=false" >> "$GITHUB_OUTPUT"
            echo "No shared-infra paths changed — skipping deploy."
          fi

  # ===========================================================================
  # Stack 1: VPC + ECR — Foundation for all projects
  # ===========================================================================
  deploy-infra:
    name: Deploy VPC + ECR
    needs: [gate]
    if: needs.gate.outputs.deploy == 'true'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-Infra-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 2: Security Baseline — GuardDuty + Security Hub + Access Analyzer
  # Independent of VPC — runs in parallel.
  # ===========================================================================
  deploy-security:
    name: Deploy Security Baseline
    needs: [gate]
    if: needs.gate.outputs.deploy == 'true'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-SecurityBaseline-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      notification-email: ${{ vars.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 3: FinOps — AWS Budgets + SNS Alerting
  # Independent of VPC — runs in parallel.
  # Cost: Free (first 2 budgets per account).
  # ===========================================================================
  deploy-finops:
    name: Deploy FinOps
    needs: [gate]
    if: needs.gate.outputs.deploy == 'true'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-FinOps-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
      notification-email: ${{ vars.NOTIFICATION_EMAIL }}
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 4: Crossplane — IAM User + Secrets Manager for K8s Infra Abstraction
  # Independent of VPC — runs in parallel.
  # Cost: $0.40/month (Secrets Manager secret storage).
  # ===========================================================================
  deploy-crossplane:
    name: Deploy Crossplane IAM
    needs: [gate]
    if: needs.gate.outputs.deploy == 'true'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-Crossplane-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  # ===========================================================================
  # Stack 5: Cognito Auth — Admin Authentication (User Pool + Hosted UI)
  # Independent of VPC — runs in parallel.
  # Cost: Free (first 50,000 MAUs).
  # ===========================================================================
  deploy-cognito:
    name: Deploy Cognito Auth
    needs: [gate]
    if: needs.gate.outputs.deploy == 'true'
    uses: ./.github/workflows/_deploy-stack.yml
    with:
      stack-name: Shared-CognitoAuth-development
      project: shared
      environment: development
      aws-account-id: ${{ vars.AWS_ACCOUNT_ID }}
      aws-region: ${{ vars.AWS_REGION || 'eu-west-1' }}
      require-approval: never
    secrets:
      AWS_OIDC_ROLE: ${{ secrets.AWS_OIDC_ROLE }}

  deploy-marker:
    name: Loki deploy marker
    needs: [gate, deploy-infra, deploy-security, deploy-finops, deploy-crossplane, deploy-cognito]
    if: always() && needs.gate.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Compute aggregate status
        id: agg
        env:
          STATUSES: ${{ toJSON(needs) }}
        run: |
          if echo "$STATUSES" | jq -e 'to_entries | any(.value.result == "failure" or .value.result == "cancelled")' > /dev/null; then
            echo "status=failed" >> "$GITHUB_OUTPUT"
          else
            echo "status=succeeded" >> "$GITHUB_OUTPUT"
          fi
      - uses: ./.github/actions/loki-deploy-marker
        env:
          LOKI_PUSH_URL:        ${{ secrets.LOKI_PUSH_URL }}
          LOKI_PUSH_BASIC_AUTH: ${{ secrets.LOKI_PUSH_BASIC_AUTH }}
          PUSHGATEWAY_URL: ${{ secrets.PUSHGATEWAY_URL }}
          PUSHGATEWAY_BASIC_AUTH: ${{ secrets.PUSHGATEWAY_BASIC_AUTH }}
        with:
          service:     cdk-shared
          environment: development
          status:      ${{ steps.agg.outputs.status }}
          git-sha:     ${{ github.sha }}
          notes:       "Shared infra (VPC + IAM + Cognito + Crossplane)"
