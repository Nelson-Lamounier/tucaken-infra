# @format
# @description Deploy SSM Bootstrap to Development
#
# Dedicated pipeline for K8s bootstrap trigger (scripts sync + Step Functions).
# The SSM Automation CDK stack is deployed by _deploy-kubernetes.yml.
#
# Triggers:
#   - Push to develop when step scripts or deploy scripts change
#   - Manual dispatch (workflow_dispatch)
#
# ─── Two Modes ─────────────────────────────────────────────────────
#
#   PUSH (automatic): S3 sync only — no Step Functions trigger.
#     Keeps bootstrap + deploy scripts in S3 current so that ASG node
#     replacement can recover using the latest committed scripts.
#     SM-A and SM-B are NOT triggered; config is applied directly via
#     ARC runners (deploy-api.yml) or via EventBridge (self-healing).
#
#   DISPATCH (manual, trigger_bootstrap=true): Full bootstrap.
#     Use when manually re-bootstrapping a cluster node or verifying
#     SSM Automation targeting after infrastructure changes.
#     SM-B fires automatically via EventBridge when SM-A succeeds.
#     To inject config only (no bootstrap), use deploy-post-bootstrap.yml.
#
# ─── Why S3 Sync Runs on Every Push ───────────────────────────────
#   ASG node replacement downloads scripts from S3 (not Git). If scripts
#   drift, a replaced node bootstraps with stale code. Push trigger ensures
#   S3 always mirrors the develop branch state.
#
# ─── ARC Runner Integration ────────────────────────────────────────
#   admin-api and public-api deploy.py runs directly on the k8s-runner pod
#   (deploy-api.yml). SM-B covers them on node replacement via EventBridge.

name: Deploy SSM Bootstrap to Development

on:
  push:
    branches: [develop]
    paths:
      - 'kubernetes-app/k8s-bootstrap/**'
      - 'kubernetes-app/workloads/charts/**'
  workflow_dispatch:
    inputs:
      trigger_bootstrap:
        description: "Trigger SM-A Step Functions bootstrap on nodes (full re-bootstrap — opt-in)"
        type: boolean
        default: false

permissions:
  id-token: write      # OIDC for aws-actions/configure-aws-credentials
  contents: read       # actions/checkout

concurrency:
  group: deploy-ssm-bootstrap-development
  cancel-in-progress: false

jobs:
  deploy:
    name: Bootstrap Development
    uses: ./.github/workflows/_deploy-ssm-automation.yml
    with:
      environment: development
      cdk-environment: development
      # Push events: trigger_bootstrap input is absent → evaluates false → S3 sync only.
      # Dispatch: honour the explicit toggle (default false — opt-in bootstrap).
      trigger-bootstrap: ${{ github.event.inputs.trigger_bootstrap == 'true' }}
    secrets: inherit
